<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCF Insights : KT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');

  :root{
    --bg-1:#060B18;
    --bg-2:#0B1B3D;
    --bg-3:#13265C;
    --card:#FFFFFF;
    --card-soft:#F3F6FC;
    --ink:#0B1B33;
    --ink-soft:#54607A;
    --line:#DCE3F0;
    --blue:#2F5FE0;
    --blue-deep:#15309C;
    --blue-glow:#5B8CFF;
    --gold:#F2B705;
    --great:#13B981;
    --great-glow:#34E3A8;
    --bad:#E94B5C;
    --bad-glow:#FF7A88;
    --warn:#F2A93B;
    --display: 'Outfit', 'Segoe UI', sans-serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; height:100%;}
  body{
    font-family:var(--sans); color:var(--ink);
    height:100vh; display:flex; flex-direction:column; overflow:hidden;
    background:
      radial-gradient(circle at 12% 0%, rgba(91,140,255,0.35), transparent 45%),
      radial-gradient(circle at 90% 10%, rgba(242,183,5,0.12), transparent 40%),
      linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
    background-attachment:fixed;
  }

  /* ---------- Header ---------- */
  header{
    padding:16px 22px; display:flex; align-items:center; justify-content:space-between;
    gap:14px; flex-wrap:wrap; backdrop-filter:blur(14px);
    background:rgba(8,16,38,0.55); border-bottom:1px solid rgba(255,255,255,0.08);
    box-shadow:0 4px 24px rgba(0,0,0,0.25);
    position:relative; z-index:5;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand .logo{
    width:38px; height:38px; border-radius:11px;
    background:linear-gradient(135deg, var(--blue-glow), var(--blue-deep));
    display:flex; align-items:center; justify-content:center; font-size:18px;
    box-shadow:0 0 0 1px rgba(255,255,255,0.18) inset, 0 6px 16px rgba(47,95,224,0.45);
  }
  .brand h1{
    font-family:var(--display); font-size:17px; font-weight:700; margin:0; color:#fff;
    letter-spacing:.2px; display:flex; align-items:center; gap:6px;
  }
  .brand .sub{font-size:11px; color:#9FB3E8; font-family:var(--mono); margin-top:1px;}
  .status{display:flex; align-items:center; gap:10px; font-size:12px; color:#B9C8EE;}
  .status .pill{
    padding:5px 12px; border-radius:20px; font-weight:700; font-family:var(--mono); font-size:11px;
    display:flex; align-items:center; gap:6px; border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.06);
  }
  .status .pill .dot{width:7px; height:7px; border-radius:50%; background:var(--great); box-shadow:0 0 8px var(--great-glow); animation:pulse 1.8s infinite;}
  .status .pill.bad .dot{background:var(--bad); box-shadow:0 0 8px var(--bad-glow); animation:none;}
  .status .pill.loading .dot{background:var(--warn); box-shadow:0 0 8px var(--warn); animation:pulse 0.8s infinite;}
  @keyframes pulse{0%,100%{opacity:1; transform:scale(1);} 50%{opacity:.55; transform:scale(1.3);}}
  button.refresh{
    border:1px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.07); color:#fff;
    border-radius:9px; padding:7px 14px; font-size:12px; cursor:pointer; font-weight:600;
    transition:all .15s ease; font-family:var(--sans);
  }
  button.refresh:hover{background:rgba(255,255,255,0.16); transform:translateY(-1px);}
  button.refresh:disabled{opacity:.4; cursor:default; transform:none;}

  /* ---------- Chat area ---------- */
  #chat{
    flex:1; overflow-y:auto; padding:24px 16px 14px; display:flex; flex-direction:column; gap:16px;
    max-width:920px; width:100%; margin:0 auto; scroll-behavior:smooth;
  }
  #chat::-webkit-scrollbar{width:8px;}
  #chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15); border-radius:8px;}

  .msg{display:flex; gap:10px; max-width:100%; animation:rise .35s cubic-bezier(.2,.8,.2,1);}
  @keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  .msg.user{justify-content:flex-end;}
  .bubble{
    padding:12px 16px; border-radius:14px; font-size:14.5px; line-height:1.6; max-width:80%;
  }
  .msg.user .bubble{
    background:linear-gradient(135deg, var(--blue), var(--blue-deep)); color:#fff;
    border-radius:14px 14px 3px 14px; box-shadow:0 6px 18px rgba(47,95,224,0.35);
    font-weight:500;
  }
  .msg.bot .bubble{
    background:var(--card); border:1px solid var(--line); color:var(--ink);
    border-radius:14px 14px 14px 3px; max-width:94%;
    box-shadow:0 8px 28px rgba(8,16,38,0.18);
  }
  .bot-icon{
    width:32px;height:32px;border-radius:10px;
    background:linear-gradient(135deg, var(--blue-glow), var(--blue-deep)); color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
    box-shadow:0 4px 14px rgba(47,95,224,0.4);
  }

  /* ---------- Verdict badge (the signature element) ---------- */
  .verdict{
    margin-top:12px; padding:14px 16px; border-radius:13px; display:flex; align-items:center; gap:14px;
    position:relative; overflow:hidden;
  }
  .verdict .vemoji{font-size:30px; line-height:1; flex-shrink:0; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.15));}
  .verdict .vtext{font-family:var(--display); font-weight:700; font-size:14.5px;}
  .verdict .vsub{font-size:12px; opacity:.85; margin-top:2px; font-weight:500;}
  .verdict.great{ background:linear-gradient(120deg, rgba(19,185,129,0.14), rgba(52,227,168,0.06)); border:1px solid rgba(19,185,129,0.35); color:#0A7A55;}
  .verdict.great .vtext{color:#0A7A55;}
  .verdict.good{ background:linear-gradient(120deg, rgba(47,95,224,0.1), rgba(91,140,255,0.05)); border:1px solid rgba(47,95,224,0.3); color:var(--blue-deep);}
  .verdict.good .vtext{color:var(--blue-deep);}
  .verdict.mid{ background:linear-gradient(120deg, rgba(242,169,59,0.14), rgba(242,169,59,0.05)); border:1px solid rgba(242,169,59,0.35); color:#8A5A0F;}
  .verdict.mid .vtext{color:#8A5A0F;}
  .verdict.bad{ background:linear-gradient(120deg, rgba(233,75,92,0.14), rgba(255,122,136,0.05)); border:1px solid rgba(233,75,92,0.35); color:#B23347;}
  .verdict.bad .vtext{color:#B23347;}
  .verdict::after{
    content:''; position:absolute; right:-30px; top:-30px; width:90px; height:90px; border-radius:50%;
    background:radial-gradient(circle, currentColor, transparent 70%); opacity:.08;
  }
  @keyframes burst{
    0%{ transform:scale(0) rotate(0deg); opacity:1;}
    60%{ transform:scale(1.3) rotate(15deg); opacity:1;}
    100%{ transform:scale(1) rotate(0deg); opacity:1;}
  }
  .verdict.great .vemoji{ animation:burst .55s cubic-bezier(.2,1.4,.4,1);}

  .answer-stat{
    font-family:var(--mono); font-size:13px; background:var(--card-soft); border-radius:9px;
    padding:9px 12px; margin-top:10px; color:var(--blue-deep); display:inline-block; font-weight:600;
    border:1px solid var(--line);
  }
  table.result{ width:100%; border-collapse:collapse; margin-top:12px; font-size:13px;}
  table.result th, table.result td{ border-bottom:1px solid var(--line); padding:8px 10px; text-align:left;}
  table.result th{ color:var(--ink-soft); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.4px; background:var(--card-soft);}
  table.result tr:hover td{background:#F8FAFE;}
  table.result td:first-child, table.result th:first-child{border-radius:0;}
  table.result tr:first-child th:first-child{border-top-left-radius:8px;}
  table.result tr:first-child th:last-child{border-top-right-radius:8px;}

  .bar-row{display:flex; align-items:center; gap:10px; margin-top:7px; font-size:13px;}
  .bar-track{flex:1; height:9px; background:var(--card-soft); border-radius:6px; overflow:hidden; border:1px solid var(--line);}
  .bar-fill{height:100%; border-radius:6px; background:linear-gradient(90deg, var(--blue-glow), var(--blue)); transition:width .6s cubic-bezier(.2,.8,.2,1);}
  .bar-fill.rank-1{background:linear-gradient(90deg, var(--great-glow), var(--great));}
  .bar-fill.rank-2{background:linear-gradient(90deg, var(--blue-glow), var(--blue));}
  .bar-fill.rank-low{background:linear-gradient(90deg, var(--bad-glow), var(--bad));}
  .bar-label{width:140px; flex-shrink:0; font-family:var(--mono); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:600;}
  .bar-val{width:64px; text-align:right; font-family:var(--mono); font-size:12px; color:var(--ink-soft); font-weight:600;}
  .medal{margin-right:3px;}

  .hint-chips{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px;}
  .chip{
    border:1px solid var(--line); background:var(--card-soft); border-radius:20px; padding:7px 13px;
    font-size:12.5px; cursor:pointer; color:var(--blue-deep); font-weight:600; transition:all .15s ease;
  }
  .chip:hover{border-color:var(--blue); background:#fff; transform:translateY(-1px); box-shadow:0 4px 12px rgba(47,95,224,0.15);}

  /* ---------- Input bar ---------- */
  #inputbar{
    padding:14px 16px 18px; display:flex; gap:10px; max-width:920px; width:100%; margin:0 auto; align-items:flex-end;
  }
  #inputbar textarea{
    flex:1; resize:none; border:1px solid rgba(255,255,255,0.18); border-radius:14px; padding:13px 16px;
    font-size:14.5px; font-family:var(--sans); max-height:90px; min-height:48px; outline:none;
    background:rgba(255,255,255,0.95); color:var(--ink); box-shadow:0 8px 24px rgba(0,0,0,0.2);
  }
  #inputbar textarea:focus{box-shadow:0 0 0 3px rgba(91,140,255,0.4), 0 8px 24px rgba(0,0,0,0.2);}
  #inputbar textarea::placeholder{color:#8A95B0;}
  #inputbar button{
    background:linear-gradient(135deg, var(--blue-glow), var(--blue-deep)); color:#fff; border:none;
    border-radius:14px; padding:0 22px; height:48px; font-weight:700; font-size:14px; cursor:pointer;
    box-shadow:0 8px 20px rgba(47,95,224,0.45); transition:transform .12s ease;
    font-family:var(--display);
  }
  #inputbar button:hover{transform:translateY(-2px);}
  #inputbar button:disabled{opacity:.4; cursor:default; transform:none;}
  .err{color:var(--bad-glow); font-weight:600;}
  .small-note{font-size:11.5px; color:var(--ink-soft); margin-top:8px;}

  @media (max-width:600px){
    .bubble{max-width:90%;}
    .bar-label{width:100px;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="logo">📊</span>
    <div>
      <h1>DCF Insights : KT</h1>
      <div class="sub">⚡ live · New_Raw_Data</div>
    </div>
  </div>
  <div class="status">
    <span id="rowsPill" class="pill loading"><span class="dot"></span>loading…</span>
    <span id="syncedAt"></span>
    <button class="refresh" id="refreshBtn">↻ Refresh data</button>
  </div>
</header>

<div id="chat"></div>

<div id="inputbar">
  <textarea id="q" placeholder="Ask me anything… 'disbursals this month by FOS' 🚀" rows="1"></textarea>
  <button id="sendBtn">Ask ✨</button>
</div>

<script>
const SHEET_ID = '1Q2SLSvOS5Lh2JCScainI3j7xqhw5Qo_0U68mmCHRFeI';
const GID = '1124116465';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
const PROXIES = [
  url => url,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

let RAW = [];
let HEADERS = [];
let lastSync = null;

const chatEl = document.getElementById('chat');
const rowsPill = document.getElementById('rowsPill');
const syncedAtEl = document.getElementById('syncedAt');
const refreshBtn = document.getElementById('refreshBtn');
const qInput = document.getElementById('q');
const sendBtn = document.getElementById('sendBtn');

// ---------- CSV parsing ----------
function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], n = text[i+1];
    if(inQuotes){
      if(c === '"' && n === '"'){ field+='"'; i++; }
      else if(c === '"'){ inQuotes = false; }
      else field += c;
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c === '\r'){ /* skip */ }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

function dedupeHeaders(rawHeaders){
  const seen = {};
  return rawHeaders.map(h => {
    let key = (h||'').trim();
    if(!key) key = 'COL';
    if(seen[key] !== undefined){ seen[key]++; return key + '_' + seen[key]; }
    seen[key] = 0;
    return key;
  });
}

function toRecords(rows){
  const headerRow = rows[0];
  HEADERS = dedupeHeaders(headerRow);
  const records = [];
  for(let i=1;i<rows.length;i++){
    const r = rows[i];
    if(r.length === 1 && r[0] === '') continue;
    const obj = {};
    HEADERS.forEach((h, idx) => { obj[h] = (r[idx] !== undefined ? r[idx].trim() : ''); });
    records.push(obj);
  }
  return records;
}

// ---------- Fetch with proxy fallback ----------
async function fetchCSV(){
  let lastErr = null;
  for(const wrap of PROXIES){
    try{
      const url = wrap(CSV_URL + (wrap === PROXIES[0] ? `&cb=${Date.now()}` : ''));
      const res = await fetch(url, {cache:'no-store'});
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      if(!text || text.length < 10 || text.startsWith('<')) throw new Error('Bad payload');
      return text;
    }catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('All sources failed');
}

async function loadData(showBotMsg){
  rowsPill.className = 'pill loading';
  rowsPill.innerHTML = '<span class="dot"></span>syncing…';
  refreshBtn.disabled = true;
  try{
    const text = await fetchCSV();
    const rows = parseCSV(text);
    RAW = toRecords(rows);
    lastSync = new Date();
    rowsPill.className = 'pill';
    rowsPill.innerHTML = `<span class="dot"></span>${RAW.length.toLocaleString()} rows`;
    syncedAtEl.textContent = '🔄 ' + lastSync.toLocaleTimeString();
    if(showBotMsg){
      addBot(`Synced ✅🎉 — pulled <b>${RAW.length.toLocaleString()}</b> fresh rows from New_Raw_Data!`);
    }
  }catch(e){
    rowsPill.className = 'pill bad';
    rowsPill.innerHTML = `<span class="dot"></span>sync failed`;
    addBot(`<span class="err">⚠️ Couldn't reach the sheet (${escapeHtml(e.message)}).</span> Make sure it's still shared as "Anyone with the link → Viewer", then hit refresh. 🔄`);
  }finally{
    refreshBtn.disabled = false;
  }
}

// ---------- Helpers ----------
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function findCol(...candidates){
  for(const c of candidates){
    const hit = HEADERS.find(h => h.toUpperCase() === c.toUpperCase());
    if(hit) return hit;
  }
  for(const c of candidates){
    const hit = HEADERS.find(h => h.toUpperCase().includes(c.toUpperCase()));
    if(hit) return hit;
  }
  return null;
}

const COL = {};
function mapColumns(){
  COL.leadId = findCol('LEAD_ID');
  COL.leadDate = findCol('LEAD_CREATION_DATE','LEAD_DATE');
  COL.loginDate = findCol('LOGIN_DATE');
  COL.approvalDate = findCol('APPROVAL_DATE');
  COL.disbursalDate = findCol('DISBURSAL_DATETIME','DISBURSAL_DATE');
  COL.channel = findCol('CHANNEL');
  COL.city = findCol('DEALER_CITY');
  COL.dealerCode = findCol('DEALER_CODEE','DEALER_CODE');
  COL.dealerName = findCol('DEALER_NAME');
  COL.fos = findCol('FOS_MAPPING');
  COL.sm = findCol('SM_MAPPING');
  COL.asm = findCol('ASM_MAPPING');
  COL.rsm = findCol('RSM_MAPPING');
  COL.rm = findCol('RM_MAPPING');
  COL.tl = findCol('TL_MAPPING');
  COL.region = findCol('REGION');
  COL.status = findCol('FINAL_LOAN_STATUS');
  COL.caseStatus = findCol('CASE_STATUS');
  COL.redFlag = findCol('RED_FLAG');
  COL.grossDisAmt = findCol('GROSS_DIS_AMT');
  COL.loanSanction = findCol('LOAN_SANCTION');
  COL.pfAmount = findCol('PF_AMOUNT');
  COL.make = findCol('MAKE');
  COL.model = findCol('MODEL');
  COL.riskBucket = findCol('RISK_BUCKET');
}

function parseDate(v){
  if(!v) return null;
  const d = new Date(v);
  if(!isNaN(d.getTime())) return d;
  const m = v.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m){
    let [_, a, b, y] = m;
    if(y.length === 2) y = '20'+y;
    const d2 = new Date(`${y}-${b.padStart(2,'0')}-${a.padStart(2,'0')}`);
    if(!isNaN(d2.getTime())) return d2;
  }
  return null;
}

function toNum(v){
  if(v === undefined || v === null) return 0;
  const n = parseFloat(String(v).replace(/[, ₹]/g,''));
  return isNaN(n) ? 0 : n;
}

function inRange(date, from, to){
  if(!date) return false;
  if(from && date < from) return false;
  if(to && date > to) return false;
  return true;
}

function monthRange(monthsAgo){
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth()-monthsAgo, 1);
  const end = new Date(now.getFullYear(), now.getMonth()-monthsAgo+1, 0, 23,59,59);
  return [start, end];
}

// ---------- Verdict scoring (the signature emoji-feedback layer) ----------
// Thresholds are deliberately tuned for lead-funnel finance data, not generic.
function verdictForConversion(pct){
  if(pct >= 35) return {tier:'great', emoji:'🔥🚀', text:`${pct.toFixed(1)}% — that's a strong funnel!`};
  if(pct >= 20) return {tier:'good', emoji:'👍', text:`${pct.toFixed(1)}% — solid, healthy conversion.`};
  if(pct >= 10) return {tier:'mid', emoji:'😐', text:`${pct.toFixed(1)}% — okay, but there's room to push.`};
  return {tier:'bad', emoji:'📉⚠️', text:`${pct.toFixed(1)}% — this needs attention.`};
}
function verdictForPendingRatio(pendingCount, totalCount){
  const pct = totalCount ? (pendingCount/totalCount*100) : 0;
  if(pct <= 10) return {tier:'great', emoji:'✅🎯', text:`Only ${pct.toFixed(1)}% stuck — backlog is under control!`};
  if(pct <= 25) return {tier:'good', emoji:'👌', text:`${pct.toFixed(1)}% pending — manageable, keep an eye on it.`};
  if(pct <= 45) return {tier:'mid', emoji:'😬', text:`${pct.toFixed(1)}% pending — backlog is building up.`};
  return {tier:'bad', emoji:'🚨📛', text:`${pct.toFixed(1)}% stuck — this is a serious bottleneck!`};
}
function verdictForCount(count, qLower){
  // generic momentum check, no historical baseline available so keep it light
  if(count === 0) return {tier:'bad', emoji:'😶', text:`Zero records found — double check the filter or the date range.`};
  if(count >= 50) return {tier:'great', emoji:'🔥', text:`${count.toLocaleString()} — that's a big number, nice volume!`};
  if(count >= 10) return {tier:'good', emoji:'👍', text:`${count.toLocaleString()} — decent volume.`};
  return {tier:'mid', emoji:'🌱', text:`${count.toLocaleString()} — light volume so far.`};
}
function verdictBadge(v){
  return `<div class="verdict ${v.tier}"><span class="vemoji">${v.emoji}</span><div><div class="vtext">${escapeHtml(v.text)}</div></div></div>`;
}
function medalFor(i){
  if(i===0) return '🥇 ';
  if(i===1) return '🥈 ';
  if(i===2) return '🥉 ';
  return '';
}
function rankClass(i, total){
  if(i===0) return 'rank-1';
  if(i < Math.ceil(total*0.3)) return 'rank-2';
  return 'rank-low';
}

// ---------- Query intent parsing ----------
function extractDateRange(qLower){
  if(/\btoday\b/.test(qLower)){
    const s = new Date(); s.setHours(0,0,0,0);
    const e = new Date(); e.setHours(23,59,59,999);
    return [s,e,'today'];
  }
  if(/\bthis month\b/.test(qLower)) return [...monthRange(0), 'this month'];
  if(/\blast month\b/.test(qLower)) return [...monthRange(1), 'last month'];
  if(/\bthis week\b/.test(qLower)){
    const now = new Date(); const day = now.getDay();
    const s = new Date(now); s.setDate(now.getDate()-day); s.setHours(0,0,0,0);
    const e = new Date(s); e.setDate(s.getDate()+6); e.setHours(23,59,59,999);
    return [s,e,'this week'];
  }
  const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
  for(let i=0;i<months.length;i++){
    if(qLower.includes(months[i])){
      const yMatch = qLower.match(/20\d{2}/);
      const year = yMatch ? parseInt(yMatch[0]) : new Date().getFullYear();
      const s = new Date(year, i, 1);
      const e = new Date(year, i+1, 0, 23,59,59);
      return [s,e, months[i]+' '+year];
    }
  }
  return [null, null, null];
}

function detectGroupCol(qLower){
  if(/\bfos\b/.test(qLower)) return {col: COL.fos, label:'FOS'};
  if(/\bsm\b|sales manager/.test(qLower)) return {col: COL.sm, label:'SM'};
  if(/\basm\b/.test(qLower)) return {col: COL.asm, label:'ASM'};
  if(/\brsm\b/.test(qLower)) return {col: COL.rsm, label:'RSM'};
  if(/\brm\b(?!apping)/.test(qLower)) return {col: COL.rm, label:'RM'};
  if(/\btl\b/.test(qLower)) return {col: COL.tl, label:'TL'};
  if(/\bcity|cities\b/.test(qLower)) return {col: COL.city, label:'City'};
  if(/\bregion\b/.test(qLower)) return {col: COL.region, label:'Region'};
  if(/\bchannel\b/.test(qLower)) return {col: COL.channel, label:'Channel'};
  if(/\bdealer\b/.test(qLower)) return {col: COL.dealerName, label:'Dealer'};
  if(/\bmake\b|\bbrand\b/.test(qLower)) return {col: COL.make, label:'Make'};
  if(/\brisk\b/.test(qLower)) return {col: COL.riskBucket, label:'Risk bucket'};
  return null;
}

function detectStage(qLower){
  if(/\bdisbursal|disbursed|disburse\b/.test(qLower)) return 'disbursal';
  if(/\bapproval|approved\b/.test(qLower)) return 'approval';
  if(/\blogin\b/.test(qLower)) return 'login';
  if(/\blead\b/.test(qLower)) return 'lead';
  return null;
}

function stageDateCol(stage){
  if(stage === 'lead') return COL.leadDate;
  if(stage === 'login') return COL.loginDate;
  if(stage === 'approval') return COL.approvalDate;
  if(stage === 'disbursal') return COL.disbursalDate;
  return null;
}

function extractNamedFilter(qOriginal, qLower){
  const m = qLower.match(/\bfor\s+([a-z0-9 .]+)$|\bfor\s+([a-z0-9 .]+?)(?:\sin\b|\sthis\b|\slast\b|$)/);
  if(m){
    const term = (m[1]||m[2]||'').trim();
    if(term && term.length > 1) return term;
  }
  return null;
}

function rowMatchesTerm(row, term){
  const t = term.toLowerCase();
  return Object.values(row).some(v => String(v).toLowerCase().includes(t));
}

// ---------- Core answer engine ----------
function answerQuery(qOriginal){
  const qLower = qOriginal.toLowerCase().trim();

  if(!RAW.length){
    return {html: `No data loaded yet 🕐 — hit "Refresh data" or wait for the initial sync.`};
  }

  const [from, to, rangeLabel] = extractDateRange(qLower);
  const stage = detectStage(qLower) || 'disbursal';
  const group = detectGroupCol(qLower);
  const namedFilter = extractNamedFilter(qOriginal, qLower);

  let rows = RAW;
  if(namedFilter){
    rows = rows.filter(r => rowMatchesTerm(r, namedFilter));
  }

  if(/\bconversion\b|\bconvert(ed)?\b|\brate\b/.test(qLower)){
    return answerConversion(rows, from, to, rangeLabel, group);
  }
  if(/\bpending|stuck|aging|not disbursed|no disbursal|awaiting\b/.test(qLower)){
    return answerPending(rows, qLower, group);
  }
  if(/\btotal amount|sum|disbursal amount|gross amount|ticket size|average ticket|avg ticket\b/.test(qLower)){
    return answerAmount(rows, from, to, rangeLabel, group, qLower);
  }
  if(group){
    return answerLeaderboard(rows, stage, from, to, rangeLabel, group);
  }
  return answerCount(rows, stage, from, to, rangeLabel, qLower);
}

function filterByStageDate(rows, stage, from, to){
  const col = stageDateCol(stage);
  if(!col) return rows.filter(()=>false);
  return rows.filter(r => {
    const d = parseDate(r[col]);
    if(!d) return false;
    if(from || to) return inRange(d, from, to);
    return true;
  });
}

function answerCount(rows, stage, from, to, rangeLabel, qLower){
  const filtered = filterByStageDate(rows, stage, from, to);
  const label = rangeLabel ? ` in <b>${escapeHtml(rangeLabel)}</b>` : '';
  const v = verdictForCount(filtered.length, qLower);
  return {
    html: `<b>${filtered.length.toLocaleString()}</b> ${stage} record(s)${label}.` + verdictBadge(v)
  };
}

function answerConversion(rows, from, to, rangeLabel, group){
  const leadCol = COL.leadDate, loginCol = COL.loginDate, apprCol = COL.approvalDate, disbCol = COL.disbursalDate;
  const inWindow = (r, col) => { const d = parseDate(r[col]); return d && (!from && !to ? true : inRange(d, from, to)); };

  if(group && group.col){
    const buckets = {};
    rows.forEach(r => {
      const key = (r[group.col] || 'Unspecified').trim() || 'Unspecified';
      if(!buckets[key]) buckets[key] = {lead:0, login:0, appr:0, disb:0};
      if(inWindow(r, leadCol)) buckets[key].lead++;
      if(inWindow(r, loginCol)) buckets[key].login++;
      if(inWindow(r, apprCol)) buckets[key].appr++;
      if(inWindow(r, disbCol)) buckets[key].disb++;
    });
    const arr = Object.entries(buckets)
      .map(([k,v]) => ({key:k, ...v, rate: v.lead ? (v.disb / v.lead * 100) : 0}))
      .filter(x => x.lead > 0)
      .sort((a,b)=>b.rate-a.rate)
      .slice(0,15);
    let html = `🏆 Lead→Disbursal conversion by <b>${group.label}</b>${rangeLabel? ' ('+escapeHtml(rangeLabel)+')':''}:<br>`;
    html += `<table class="result"><tr><th>${group.label}</th><th>Leads</th><th>Disbursed</th><th>Conv %</th></tr>`;
    arr.forEach((x,i) => {
      html += `<tr><td>${medalFor(i)}${escapeHtml(x.key)}</td><td>${x.lead}</td><td>${x.disb}</td><td>${x.rate.toFixed(1)}%</td></tr>`;
    });
    html += `</table>`;
    if(arr.length){
      const top = arr[0];
      html += verdictBadge(verdictForConversion(top.rate));
    }
    return {html};
  }

  let lead=0, login=0, appr=0, disb=0;
  rows.forEach(r=>{
    if(inWindow(r, leadCol)) lead++;
    if(inWindow(r, loginCol)) login++;
    if(inWindow(r, apprCol)) appr++;
    if(inWindow(r, disbCol)) disb++;
  });
  const pct = (a,b)=> b ? (a/b*100) : 0;
  const overallRate = pct(disb, lead);
  const label = rangeLabel ? ` (${escapeHtml(rangeLabel)})` : '';
  const v = verdictForConversion(overallRate);
  return {html:
    `Funnel${label}: 📊<br>` +
    `<div class="bar-row"><span class="bar-label">📥 Lead</span><div class="bar-track"><div class="bar-fill rank-1" style="width:100%"></div></div><span class="bar-val">${lead}</span></div>` +
    `<div class="bar-row"><span class="bar-label">🔐 Login</span><div class="bar-track"><div class="bar-fill rank-2" style="width:${lead?login/lead*100:0}%"></div></div><span class="bar-val">${login}</span></div>` +
    `<div class="bar-row"><span class="bar-label">✅ Approval</span><div class="bar-track"><div class="bar-fill rank-2" style="width:${lead?appr/lead*100:0}%"></div></div><span class="bar-val">${appr}</span></div>` +
    `<div class="bar-row"><span class="bar-label">💸 Disbursal</span><div class="bar-track"><div class="bar-fill rank-low" style="width:${lead?disb/lead*100:0}%"></div></div><span class="bar-val">${disb}</span></div>` +
    `<div class="answer-stat">Login→Approval: ${pct(appr,login).toFixed(1)}% · Approval→Disbursal: ${pct(disb,appr).toFixed(1)}% · Lead→Disbursal: ${overallRate.toFixed(1)}%</div>` +
    verdictBadge(v)
  };
}

function answerPending(rows, qLower, group){
  let stageGap = 'approval';
  if(/disbursal|disburse/.test(qLower)) stageGap = 'disbursal';

  let pendingRows, baselineRows, title;
  if(stageGap === 'disbursal'){
    baselineRows = rows.filter(r => parseDate(r[COL.approvalDate]));
    pendingRows = baselineRows.filter(r => !parseDate(r[COL.disbursalDate]));
    title = 'Approved but not yet disbursed';
  } else {
    baselineRows = rows.filter(r => parseDate(r[COL.loginDate]));
    pendingRows = baselineRows.filter(r => !parseDate(r[COL.approvalDate]));
    title = 'Logged in but not yet approved';
  }

  if(group && group.col){
    const buckets = {};
    pendingRows.forEach(r => {
      const key = (r[group.col] || 'Unspecified').trim() || 'Unspecified';
      buckets[key] = (buckets[key]||0)+1;
    });
    const arr = Object.entries(buckets).sort((a,b)=>b[1]-a[1]).slice(0,15);
    const max = arr.length ? arr[0][1] : 1;
    let html = `⏳ <b>${title}</b> — by ${group.label} (total ${pendingRows.length}):<br>`;
    arr.forEach(([k,v],i)=>{
      html += `<div class="bar-row"><span class="bar-label">${escapeHtml(k)}</span><div class="bar-track"><div class="bar-fill ${rankClass(arr.length-1-i, arr.length)}" style="width:${v/max*100}%"></div></div><span class="bar-val">${v}</span></div>`;
    });
    html += verdictBadge(verdictForPendingRatio(pendingRows.length, baselineRows.length));
    return {html};
  }

  const v = verdictForPendingRatio(pendingRows.length, baselineRows.length);
  return {html: `⏳ <b>${pendingRows.length.toLocaleString()}</b> case(s) — ${title.toLowerCase()}.` + verdictBadge(v)};
}

function answerAmount(rows, from, to, rangeLabel, group, qLower){
  const amtCol = COL.grossDisAmt || COL.loanSanction;
  const wantAvg = /\baverage|avg\b/.test(qLower);
  const disbRows = rows.filter(r => {
    const d = parseDate(r[COL.disbursalDate]);
    if(!d) return false;
    if(from || to) return inRange(d, from, to);
    return true;
  });

  if(group && group.col){
    const buckets = {};
    disbRows.forEach(r => {
      const key = (r[group.col] || 'Unspecified').trim() || 'Unspecified';
      if(!buckets[key]) buckets[key] = {sum:0, n:0};
      buckets[key].sum += toNum(r[amtCol]);
      buckets[key].n++;
    });
    const arr = Object.entries(buckets)
      .map(([k,v])=>({key:k, sum:v.sum, n:v.n, avg: v.n? v.sum/v.n : 0}))
      .sort((a,b)=> wantAvg ? b.avg-a.avg : b.sum-a.sum)
      .slice(0,15);
    let html = `💰 ${wantAvg? 'Average':'Total'} disbursal amount by <b>${group.label}</b>${rangeLabel?' ('+escapeHtml(rangeLabel)+')':''}:<br>`;
    html += `<table class="result"><tr><th>${group.label}</th><th>Count</th><th>${wantAvg?'Avg':'Total'} Amount</th></tr>`;
    arr.forEach((x,i)=>{
      const val = wantAvg ? x.avg : x.sum;
      html += `<tr><td>${medalFor(i)}${escapeHtml(x.key)}</td><td>${x.n}</td><td>₹${Math.round(val).toLocaleString('en-IN')}</td></tr>`;
    });
    html += `</table>`;
    return {html};
  }

  const total = disbRows.reduce((s,r)=> s + toNum(r[amtCol]), 0);
  const avg = disbRows.length ? total/disbRows.length : 0;
  const label = rangeLabel ? ` (${escapeHtml(rangeLabel)})` : '';
  const v = verdictForCount(disbRows.length, qLower);
  return {html:
    `💰 Disbursed amount${label}: <b>₹${Math.round(total).toLocaleString('en-IN')}</b> across ${disbRows.length} case(s).` +
    `<div class="answer-stat">Avg ticket size: ₹${Math.round(avg).toLocaleString('en-IN')}</div>` +
    verdictBadge(v)
  };
}

function answerLeaderboard(rows, stage, from, to, rangeLabel, group){
  const filtered = filterByStageDate(rows, stage, from, to);
  const buckets = {};
  filtered.forEach(r => {
    const key = (r[group.col] || 'Unspecified').trim() || 'Unspecified';
    buckets[key] = (buckets[key]||0)+1;
  });
  const arr = Object.entries(buckets).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const max = arr.length ? arr[0][1] : 1;
  const label = rangeLabel ? ` (${escapeHtml(rangeLabel)})` : '';
  let html = `🏆 <b>${stage[0].toUpperCase()+stage.slice(1)}</b> count by <b>${group.label}</b>${label} — total ${filtered.length}:<br>`;
  arr.forEach(([k,v],i)=>{
    html += `<div class="bar-row"><span class="bar-label">${medalFor(i)}${escapeHtml(k)}</span><div class="bar-track"><div class="bar-fill ${rankClass(i, arr.length)}" style="width:${v/max*100}%"></div></div><span class="bar-val">${v}</span></div>`;
  });
  html += verdictBadge(verdictForCount(filtered.length, ''));
  return {html};
}

// ---------- Chat UI ----------
function addUser(text){
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function addBot(html){
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="bot-icon">🤖</div><div class="bubble">${html}</div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function welcomeMessage(){
  addBot(`Hey Kushagra! 👋✨ Connected to <b>New_Raw_Data</b> — let's dig in. Try asking:
  <div class="hint-chips">
    <span class="chip" data-q="disbursals this month by FOS">🚀 disbursals this month by FOS</span>
    <span class="chip" data-q="lead to disbursal conversion rate">📈 lead to disbursal conversion rate</span>
    <span class="chip" data-q="pending approvals by city">⏳ pending approvals by city</span>
    <span class="chip" data-q="total disbursal amount this month">💰 total disbursal amount this month</span>
    <span class="chip" data-q="logins by dealer this week">🔐 logins by dealer this week</span>
  </div>`);
  attachChipHandlers();
}

function attachChipHandlers(){
  document.querySelectorAll('.chip').forEach(c => {
    c.onclick = () => { qInput.value = c.dataset.q; handleSend(); };
  });
}

function handleSend(){
  const text = qInput.value.trim();
  if(!text) return;
  addUser(text);
  qInput.value = '';
  qInput.style.height = 'auto';
  try{
    const res = answerQuery(text);
    addBot(res.html);
  }catch(e){
    addBot(`<span class="err">😵‍💫 Hit an error reading that: ${escapeHtml(e.message)}</span>`);
  }
}

sendBtn.onclick = handleSend;
qInput.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); handleSend(); }
});
qInput.addEventListener('input', () => {
  qInput.style.height = 'auto';
  qInput.style.height = Math.min(qInput.scrollHeight, 90) + 'px';
});
refreshBtn.onclick = () => loadData(true);

// ---------- Init ----------
(async function init(){
  welcomeMessage();
  await loadData(false);
  mapColumns();
})();
</script>
