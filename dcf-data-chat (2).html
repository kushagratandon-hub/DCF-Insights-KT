<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCF Insights : KT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');
  :root{
    --bg-1:#060B18; --bg-2:#0B1B3D; --bg-3:#13265C;
    --card:#FFFFFF; --card-soft:#F3F6FC; --ink:#0B1B33; --ink-soft:#54607A; --line:#DCE3F0;
    --blue:#2F5FE0; --blue-deep:#15309C; --blue-glow:#5B8CFF;
    --gold:#F2B705; --great:#13B981; --great-glow:#34E3A8;
    --bad:#E94B5C; --bad-glow:#FF7A88; --warn:#F2A93B;
    --display:'Outfit','Segoe UI',sans-serif; --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; height:100%;}
  body{
    font-family:var(--sans); color:var(--ink); height:100vh; display:flex; flex-direction:column; overflow:hidden;
    background:
      radial-gradient(circle at 12% 0%, rgba(91,140,255,0.35), transparent 45%),
      radial-gradient(circle at 90% 10%, rgba(242,183,5,0.12), transparent 40%),
      linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
    background-attachment:fixed;
  }
  header{
    padding:16px 22px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
    backdrop-filter:blur(14px); background:rgba(8,16,38,0.55); border-bottom:1px solid rgba(255,255,255,0.08);
    box-shadow:0 4px 24px rgba(0,0,0,0.25); position:relative; z-index:5;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand .logo{
    width:38px; height:38px; border-radius:11px; background:linear-gradient(135deg, var(--blue-glow), var(--blue-deep));
    display:flex; align-items:center; justify-content:center; font-size:18px;
    box-shadow:0 0 0 1px rgba(255,255,255,0.18) inset, 0 6px 16px rgba(47,95,224,0.45);
  }
  .brand h1{font-family:var(--display); font-size:17px; font-weight:700; margin:0; color:#fff; letter-spacing:.2px;}
  .brand .sub{font-size:11px; color:#9FB3E8; font-family:var(--mono); margin-top:1px;}
  .status{display:flex; align-items:center; gap:10px; font-size:12px; color:#B9C8EE;}
  .status .pill{
    padding:5px 12px; border-radius:20px; font-weight:700; font-family:var(--mono); font-size:11px;
    display:flex; align-items:center; gap:6px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.06);
  }
  .status .pill .dot{width:7px; height:7px; border-radius:50%; background:var(--great); box-shadow:0 0 8px var(--great-glow); animation:pulse 1.8s infinite;}
  .status .pill.bad .dot{background:var(--bad); box-shadow:0 0 8px var(--bad-glow); animation:none;}
  .status .pill.loading .dot{background:var(--warn); box-shadow:0 0 8px var(--warn); animation:pulse 0.8s infinite;}
  @keyframes pulse{0%,100%{opacity:1; transform:scale(1);} 50%{opacity:.55; transform:scale(1.3);}}
  button.refresh{
    border:1px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.07); color:#fff; border-radius:9px;
    padding:7px 14px; font-size:12px; cursor:pointer; font-weight:600; transition:all .15s ease; font-family:var(--sans);
  }
  button.refresh:hover{background:rgba(255,255,255,0.16); transform:translateY(-1px);}
  button.refresh:disabled{opacity:.4; cursor:default; transform:none;}

  #chat{flex:1; overflow-y:auto; padding:24px 16px 14px; display:flex; flex-direction:column; gap:16px; max-width:980px; width:100%; margin:0 auto; scroll-behavior:smooth;}
  #chat::-webkit-scrollbar{width:8px;}
  #chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15); border-radius:8px;}
  .msg{display:flex; gap:10px; max-width:100%; animation:rise .35s cubic-bezier(.2,.8,.2,1);}
  @keyframes rise{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
  .msg.user{justify-content:flex-end;}
  .bubble{padding:12px 16px; border-radius:14px; font-size:14.5px; line-height:1.6; max-width:80%;}
  .msg.user .bubble{background:linear-gradient(135deg, var(--blue), var(--blue-deep)); color:#fff; border-radius:14px 14px 3px 14px; box-shadow:0 6px 18px rgba(47,95,224,0.35); font-weight:500;}
  .msg.bot .bubble{background:var(--card); border:1px solid var(--line); color:var(--ink); border-radius:14px 14px 14px 3px; max-width:96%; box-shadow:0 8px 28px rgba(8,16,38,0.18);}
  .bot-icon{width:32px;height:32px;border-radius:10px; background:linear-gradient(135deg, var(--blue-glow), var(--blue-deep)); color:#fff; display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0; box-shadow:0 4px 14px rgba(47,95,224,0.4);}

  /* Executive report styling */
  .report h2{font-family:var(--display); font-size:14.5px; font-weight:700; margin:18px 0 8px; color:var(--blue-deep); display:flex; align-items:center; gap:7px;}
  .report h2:first-child{margin-top:0;}
  .report .divider{border:none; border-top:1px solid var(--line); margin:14px 0;}
  .report p{margin:4px 0; line-height:1.6;}
  .report ul{margin:6px 0; padding-left:20px;}
  .report li{margin:4px 0; line-height:1.55;}

  .verdict{margin-top:8px; padding:14px 16px; border-radius:13px; display:flex; align-items:center; gap:14px; position:relative; overflow:hidden;}
  .verdict .vemoji{font-size:28px; line-height:1; flex-shrink:0; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.15));}
  .verdict .vtext{font-family:var(--display); font-weight:700; font-size:14px;}
  .verdict.great{background:linear-gradient(120deg, rgba(19,185,129,0.14), rgba(52,227,168,0.06)); border:1px solid rgba(19,185,129,0.35);}
  .verdict.great .vtext{color:#0A7A55;}
  .verdict.good{background:linear-gradient(120deg, rgba(47,95,224,0.1), rgba(91,140,255,0.05)); border:1px solid rgba(47,95,224,0.3);}
  .verdict.good .vtext{color:var(--blue-deep);}
  .verdict.mid{background:linear-gradient(120deg, rgba(242,169,59,0.14), rgba(242,169,59,0.05)); border:1px solid rgba(242,169,59,0.35);}
  .verdict.mid .vtext{color:#8A5A0F;}
  .verdict.bad{background:linear-gradient(120deg, rgba(233,75,92,0.14), rgba(255,122,136,0.05)); border:1px solid rgba(233,75,92,0.35);}
  .verdict.bad .vtext{color:#B23347;}
  @keyframes burst{0%{transform:scale(0) rotate(0deg); opacity:1;} 60%{transform:scale(1.3) rotate(15deg); opacity:1;} 100%{transform:scale(1) rotate(0deg); opacity:1;}}
  .verdict.great .vemoji{animation:burst .55s cubic-bezier(.2,1.4,.4,1);}

  .risk-item, .opp-item{padding:9px 12px; border-radius:9px; margin:6px 0; font-size:13.5px; display:flex; gap:8px; align-items:flex-start;}
  .risk-item.High{background:rgba(233,75,92,0.08); border:1px solid rgba(233,75,92,0.25);}
  .risk-item.Medium{background:rgba(242,169,59,0.08); border:1px solid rgba(242,169,59,0.25);}
  .risk-item.Low{background:rgba(19,185,129,0.08); border:1px solid rgba(19,185,129,0.25);}
  .opp-item{background:rgba(47,95,224,0.07); border:1px solid rgba(47,95,224,0.2);}
  .badge-sev{font-family:var(--mono); font-size:10px; font-weight:700; padding:1px 6px; border-radius:5px; flex-shrink:0; margin-top:2px;}
  .badge-sev.High{background:var(--bad); color:#fff;}
  .badge-sev.Medium{background:var(--warn); color:#3A2A00;}
  .badge-sev.Low{background:var(--great); color:#fff;}

  .answer-stat{font-family:var(--mono); font-size:13px; background:var(--card-soft); border-radius:9px; padding:9px 12px; margin-top:8px; color:var(--blue-deep); display:inline-block; font-weight:600; border:1px solid var(--line);}
  table.result{width:100%; border-collapse:collapse; margin-top:10px; font-size:13px;}
  table.result th, table.result td{border-bottom:1px solid var(--line); padding:8px 10px; text-align:left;}
  table.result th{color:var(--ink-soft); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.4px; background:var(--card-soft);}
  table.result tr:hover td{background:#F8FAFE;}
  .pos{color:var(--great); font-weight:700;}
  .neg{color:var(--bad); font-weight:700;}
  .proj-note{font-size:11.5px; color:var(--ink-soft); font-style:italic; margin-top:4px;}

  .bar-row{display:flex; align-items:center; gap:10px; margin-top:7px; font-size:13px;}
  .bar-track{flex:1; height:9px; background:var(--card-soft); border-radius:6px; overflow:hidden; border:1px solid var(--line);}
  .bar-fill{height:100%; border-radius:6px; background:linear-gradient(90deg, var(--blue-glow), var(--blue)); transition:width .6s cubic-bezier(.2,.8,.2,1);}
  .bar-fill.rank-1{background:linear-gradient(90deg, var(--great-glow), var(--great));}
  .bar-fill.rank-2{background:linear-gradient(90deg, var(--blue-glow), var(--blue));}
  .bar-fill.rank-low{background:linear-gradient(90deg, var(--bad-glow), var(--bad));}
  .bar-label{width:140px; flex-shrink:0; font-family:var(--mono); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:600;}
  .bar-val{width:64px; text-align:right; font-family:var(--mono); font-size:12px; color:var(--ink-soft); font-weight:600;}

  .hint-chips{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px;}
  .chip{border:1px solid var(--line); background:var(--card-soft); border-radius:20px; padding:7px 13px; font-size:12.5px; cursor:pointer; color:var(--blue-deep); font-weight:600; transition:all .15s ease;}
  .chip:hover{border-color:var(--blue); background:#fff; transform:translateY(-1px); box-shadow:0 4px 12px rgba(47,95,224,0.15);}

  #inputbar{padding:14px 16px 18px; display:flex; gap:10px; max-width:980px; width:100%; margin:0 auto; align-items:flex-end;}
  #inputbar textarea{flex:1; resize:none; border:1px solid rgba(255,255,255,0.18); border-radius:14px; padding:13px 16px; font-size:14.5px; font-family:var(--sans); max-height:90px; min-height:48px; outline:none; background:rgba(255,255,255,0.95); color:var(--ink); box-shadow:0 8px 24px rgba(0,0,0,0.2);}
  #inputbar textarea:focus{box-shadow:0 0 0 3px rgba(91,140,255,0.4), 0 8px 24px rgba(0,0,0,0.2);}
  #inputbar textarea::placeholder{color:#8A95B0;}
  #inputbar button{background:linear-gradient(135deg, var(--blue-glow), var(--blue-deep)); color:#fff; border:none; border-radius:14px; padding:0 22px; height:48px; font-weight:700; font-size:14px; cursor:pointer; box-shadow:0 8px 20px rgba(47,95,224,0.45); transition:transform .12s ease; font-family:var(--display);}
  #inputbar button:hover{transform:translateY(-2px);}
  #inputbar button:disabled{opacity:.4; cursor:default; transform:none;}
  .err{color:var(--bad-glow); font-weight:600;}
  @media (max-width:600px){.bubble{max-width:92%;} .bar-label{width:100px;}}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="logo">📊</span>
    <div>
      <h1>DCF Insights : KT</h1>
      <div class="sub">⚡ live · New_Raw_Data · Executive Intelligence Mode</div>
    </div>
  </div>
  <div class="status">
    <span id="rowsPill" class="pill loading"><span class="dot"></span>loading…</span>
    <span id="syncedAt"></span>
    <button class="refresh" id="refreshBtn">↻ Refresh data</button>
  </div>
</header>

<div id="chat"></div>

<div id="inputbar">
  <textarea id="q" placeholder="Ask me anything… 'Bharat Car Bazaar disbursals' or 'why did Kanpur drop this month'" rows="1"></textarea>
  <button id="sendBtn">Analyze ✨</button>
</div>

<script>
const SHEET_ID = '1Q2SLSvOS5Lh2JCScainI3j7xqhw5Qo_0U68mmCHRFeI';
const GID = '1124116465';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
const PROXIES = [
  url => url,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

let RAW = [];
let HEADERS = [];
let lastSync = null;

const chatEl = document.getElementById('chat');
const rowsPill = document.getElementById('rowsPill');
const syncedAtEl = document.getElementById('syncedAt');
const refreshBtn = document.getElementById('refreshBtn');
const qInput = document.getElementById('q');
const sendBtn = document.getElementById('sendBtn');

// ================= CSV / DATA LAYER =================
function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], n = text[i+1];
    if(inQuotes){
      if(c === '"' && n === '"'){ field+='"'; i++; }
      else if(c === '"'){ inQuotes = false; }
      else field += c;
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c === '\r'){ }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}
function dedupeHeaders(rawHeaders){
  const seen = {};
  return rawHeaders.map(h => {
    let key = (h||'').trim();
    if(!key) key = 'COL';
    if(seen[key] !== undefined){ seen[key]++; return key+'_'+seen[key]; }
    seen[key]=0; return key;
  });
}
function toRecords(rows){
  HEADERS = dedupeHeaders(rows[0]);
  const records = [];
  for(let i=1;i<rows.length;i++){
    const r = rows[i];
    if(r.length===1 && r[0]==='') continue;
    const obj = {};
    HEADERS.forEach((h,idx)=>{ obj[h]=(r[idx]!==undefined?r[idx].trim():''); });
    records.push(obj);
  }
  return records;
}
async function fetchCSV(){
  let lastErr = null;
  for(const wrap of PROXIES){
    try{
      const url = wrap(CSV_URL + (wrap === PROXIES[0] ? `&cb=${Date.now()}` : ''));
      const res = await fetch(url, {cache:'no-store'});
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      if(!text || text.length < 10 || text.startsWith('<')) throw new Error('Bad payload');
      return text;
    }catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('All sources failed');
}
async function loadData(showBotMsg){
  rowsPill.className = 'pill loading';
  rowsPill.innerHTML = '<span class="dot"></span>syncing…';
  refreshBtn.disabled = true;
  try{
    const text = await fetchCSV();
    RAW = toRecords(parseCSV(text));
    lastSync = new Date();
    rowsPill.className = 'pill';
    rowsPill.innerHTML = `<span class="dot"></span>${RAW.length.toLocaleString()} rows`;
    syncedAtEl.textContent = '🔄 ' + lastSync.toLocaleTimeString();
    mapColumns();
    if(showBotMsg) addBot(`Synced ✅🎉 — pulled <b>${RAW.length.toLocaleString()}</b> fresh rows from New_Raw_Data!`);
  }catch(e){
    rowsPill.className = 'pill bad';
    rowsPill.innerHTML = `<span class="dot"></span>sync failed`;
    addBot(`<span class="err">⚠️ Couldn't reach the sheet (${escapeHtml(e.message)}).</span> Make sure it's still shared as "Anyone with the link → Viewer", then hit refresh. 🔄`);
  }finally{
    refreshBtn.disabled = false;
  }
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function findCol(...candidates){
  for(const c of candidates){ const hit = HEADERS.find(h => h.toUpperCase() === c.toUpperCase()); if(hit) return hit; }
  for(const c of candidates){ const hit = HEADERS.find(h => h.toUpperCase().includes(c.toUpperCase())); if(hit) return hit; }
  return null;
}
const COL = {};
function mapColumns(){
  COL.leadId = findCol('LEAD_ID');
  COL.leadDate = findCol('LEAD_CREATION_DATE','LEAD_DATE');
  COL.loginDate = findCol('LOGIN_DATE');
  COL.approvalDate = findCol('APPROVAL_DATE');
  COL.disbursalDate = findCol('DISBURSAL_DATETIME','DISBURSAL_DATE');
  COL.channel = findCol('CHANNEL');
  COL.city = findCol('DEALER_CITY');
  COL.dealerCode = findCol('DEALER_CODEE','DEALER_CODE');
  COL.dealerName = findCol('DEALER_NAME');
  COL.fos = findCol('FOS_MAPPING');
  COL.sm = findCol('SM_MAPPING');
  COL.asm = findCol('ASM_MAPPING');
  COL.rsm = findCol('RSM_MAPPING');
  COL.rm = findCol('RM_MAPPING');
  COL.tl = findCol('TL_MAPPING');
  COL.region = findCol('REGION');
  COL.status = findCol('FINAL_LOAN_STATUS');
  COL.caseStatus = findCol('CASE_STATUS');
  COL.redFlag = findCol('RED_FLAG');
  COL.grossDisAmt = findCol('GROSS_DIS_AMT');
  COL.loanSanction = findCol('LOAN_SANCTION');
  COL.pfAmount = findCol('PF_AMOUNT');
  COL.make = findCol('MAKE');
  COL.model = findCol('MODEL');
  COL.riskBucket = findCol('RISK_BUCKET');
}
function parseDate(v){
  if(!v) return null;
  const d = new Date(v);
  if(!isNaN(d.getTime())) return d;
  const m = v.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m){
    let [_, a, b, y] = m;
    if(y.length === 2) y = '20'+y;
    const d2 = new Date(`${y}-${b.padStart(2,'0')}-${a.padStart(2,'0')}`);
    if(!isNaN(d2.getTime())) return d2;
  }
  return null;
}
function toNum(v){
  if(v === undefined || v === null) return 0;
  const n = parseFloat(String(v).replace(/[, ₹]/g,''));
  return isNaN(n) ? 0 : n;
}
function inRange(date, from, to){
  if(!date) return false;
  if(from && date < from) return false;
  if(to && date > to) return false;
  return true;
}

// ================= DATE ENGINE =================
function mtdRange(now){ return [new Date(now.getFullYear(), now.getMonth(), 1,0,0,0,0), new Date(now)]; }
function lmtdRange(now){
  const pm = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const start = new Date(pm.getFullYear(), pm.getMonth(), 1,0,0,0,0);
  const daysInPrev = new Date(pm.getFullYear(), pm.getMonth()+1, 0).getDate();
  const targetDay = Math.min(now.getDate(), daysInPrev);
  const end = new Date(pm.getFullYear(), pm.getMonth(), targetDay, 23,59,59,999);
  return [start, end];
}
function wtdRange(now){ const day=now.getDay(); const s=new Date(now); s.setDate(now.getDate()-day); s.setHours(0,0,0,0); return [s, new Date(now)]; }
function lwtdRange(now){ const day=now.getDay(); const ts=new Date(now); ts.setDate(now.getDate()-day); ts.setHours(0,0,0,0); const s=new Date(ts); s.setDate(ts.getDate()-7); const e=new Date(s); e.setDate(s.getDate()+day); e.setHours(23,59,59,999); return [s,e]; }
function qtdRange(now){ const q=Math.floor(now.getMonth()/3); return [new Date(now.getFullYear(), q*3,1,0,0,0,0), new Date(now)]; }
function lqtdRange(now){
  const q=Math.floor(now.getMonth()/3); const pqm=(q-1)*3; const year=pqm<0?now.getFullYear()-1:now.getFullYear(); const month=pqm<0?pqm+12:pqm;
  const start=new Date(year,month,1,0,0,0,0); const qStart=new Date(now.getFullYear(),q*3,1);
  const daysElapsed=Math.floor((now-qStart)/(1000*60*60*24)); const end=new Date(start); end.setDate(start.getDate()+daysElapsed); end.setHours(23,59,59,999);
  return [start,end];
}
function ytdRange(now){ return [new Date(now.getFullYear(),0,1,0,0,0,0), new Date(now)]; }
function lytdRange(now){ return [new Date(now.getFullYear()-1,0,1,0,0,0,0), new Date(now.getFullYear()-1, now.getMonth(), now.getDate(),23,59,59,999)]; }

function extractDateRange(qLower){
  const now = new Date();
  if(/\btoday\b/.test(qLower)){
    const s=new Date(); s.setHours(0,0,0,0); const e=new Date(); e.setHours(23,59,59,999);
    const ys=new Date(s); ys.setDate(ys.getDate()-1); const ye=new Date(e); ye.setDate(ye.getDate()-1);
    return {from:s,to:e,label:'today', priorFrom:ys, priorTo:ye, priorLabel:'yesterday'};
  }
  if(/\bthis week\b/.test(qLower)){
    const [f,t]=wtdRange(now); const [pf,pt]=lwtdRange(now);
    return {from:f,to:t,label:'this week', priorFrom:pf, priorTo:pt, priorLabel:'last week'};
  }
  if(/\bthis month\b|\bmtd\b/.test(qLower)){
    const [f,t]=mtdRange(now); const [pf,pt]=lmtdRange(now);
    return {from:f,to:t,label:'MTD', priorFrom:pf, priorTo:pt, priorLabel:'LMTD'};
  }
  if(/\blast month\b/.test(qLower)){
    const [f,t]=lmtdRange(now);
    // "prior" to last-month-MTD is the month before that, same day-alignment
    const refNow = new Date(now.getFullYear(), now.getMonth()-1, now.getDate());
    const [pf,pt]=lmtdRange(refNow);
    return {from:f,to:t,label:'last month (LMTD-aligned)', priorFrom:pf, priorTo:pt, priorLabel:'month before that'};
  }
  if(/\bthis quarter\b|\bqtd\b/.test(qLower)){
    const [f,t]=qtdRange(now); const [pf,pt]=lqtdRange(now);
    return {from:f,to:t,label:'QTD', priorFrom:pf, priorTo:pt, priorLabel:'LQTD'};
  }
  if(/\bthis year\b|\bytd\b/.test(qLower)){
    const [f,t]=ytdRange(now); const [pf,pt]=lytdRange(now);
    return {from:f,to:t,label:'YTD', priorFrom:pf, priorTo:pt, priorLabel:'LYTD'};
  }
  const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
  for(let i=0;i<months.length;i++){
    if(qLower.includes(months[i])){
      const yMatch = qLower.match(/20\d{2}/); const year = yMatch?parseInt(yMatch[0]):now.getFullYear();
      const s=new Date(year,i,1); const e=new Date(year,i+1,0,23,59,59);
      const pm = i===0? {y:year-1, m:11} : {y:year, m:i-1};
      const ps = new Date(pm.y, pm.m, 1); const pe = new Date(pm.y, pm.m+1, 0, 23,59,59);
      return {from:s, to:e, label: months[i]+' '+year, priorFrom:ps, priorTo:pe, priorLabel: months[pm.m]+' '+pm.y};
    }
  }
  return {from:null, to:null, label:null, priorFrom:null, priorTo:null, priorLabel:null};
}

// ================= ENTITY DETECTION =================
function detectGroupCol(qLower){
  if(/\bfos\b/.test(qLower)) return {col: COL.fos, label:'FOS'};
  if(/\bsm\b|sales manager/.test(qLower)) return {col: COL.sm, label:'SM'};
  if(/\basm\b/.test(qLower)) return {col: COL.asm, label:'ASM'};
  if(/\brsm\b/.test(qLower)) return {col: COL.rsm, label:'RSM'};
  if(/\brm\b(?!apping)/.test(qLower)) return {col: COL.rm, label:'RM'};
  if(/\btl\b/.test(qLower)) return {col: COL.tl, label:'TL'};
  if(/\bcity|cities\b/.test(qLower)) return {col: COL.city, label:'City'};
  if(/\bregion\b/.test(qLower)) return {col: COL.region, label:'Region'};
  if(/\bchannel\b/.test(qLower)) return {col: COL.channel, label:'Channel'};
  if(/\bdealer\b/.test(qLower)) return {col: COL.dealerName, label:'Dealer'};
  if(/\bmake\b|\bbrand\b/.test(qLower)) return {col: COL.make, label:'Make'};
  if(/\brisk\b/.test(qLower)) return {col: COL.riskBucket, label:'Risk bucket'};
  return null;
}
function detectStage(qLower){
  if(/\bdisbursal|disbursed|disburse\b/.test(qLower)) return 'disbursal';
  if(/\bapproval|approved\b/.test(qLower)) return 'approval';
  if(/\blogin\b/.test(qLower)) return 'login';
  if(/\blead\b/.test(qLower)) return 'lead';
  return 'disbursal';
}
function stageDateCol(stage){
  if(stage==='lead') return COL.leadDate;
  if(stage==='login') return COL.loginDate;
  if(stage==='approval') return COL.approvalDate;
  if(stage==='disbursal') return COL.disbursalDate;
  return null;
}
// Find a specific named entity mentioned in the query by scanning all rows'
// dealer/FOS/SM/RSM/city/region values for a fuzzy match against the query text.
function detectNamedEntity(qOriginal){
  const dims = [
    {col: COL.dealerName, label:'Dealer'}, {col: COL.fos, label:'FOS'}, {col: COL.sm, label:'SM'},
    {col: COL.rsm, label:'RSM'}, {col: COL.city, label:'City'}, {col: COL.region, label:'Region'},
    {col: COL.channel, label:'Channel'},
  ];
  const qLower = qOriginal.toLowerCase();
  let best = null;
  for(const dim of dims){
    if(!dim.col) continue;
    const values = new Set(RAW.map(r => r[dim.col]).filter(Boolean));
    for(const val of values){
      const v = val.toLowerCase().trim();
      if(v.length < 3) continue;
      if(qLower.includes(v)){
        if(!best || v.length > best.value.length){ best = {dim, value: val}; }
      }
    }
  }
  return best;
}

// ================= RANK / TREND / DRIVER / RISK ENGINES =================
function rankEntity(allBuckets, entityKey){
  const sorted = Object.entries(allBuckets).sort((a,b)=>b[1]-a[1]);
  const rank = sorted.findIndex(([k])=>k===entityKey)+1;
  const total = sorted.length;
  const topVal = sorted.length?sorted[0][1]:0;
  const avgVal = sorted.length?sorted.reduce((s,[,v])=>s+v,0)/sorted.length:0;
  const entityVal = allBuckets[entityKey]||0;
  return {rank, totalEntities:total, value:entityVal, topValue:topVal, topKey:sorted[0]?.[0], avgValue:avgVal,
    vsAvgPct: avgVal?((entityVal-avgVal)/avgVal*100):0, vsTopPct: topVal?((entityVal-topVal)/topVal*100):0};
}
function classifyTrend(series){
  const n = series.length;
  if(n<2) return {trend:'insufficient_data', normalizedSlopePct:0};
  const xs = series.map((_,i)=>i); const meanX=xs.reduce((a,b)=>a+b,0)/n; const meanY=series.reduce((a,b)=>a+b,0)/n;
  let num=0, den=0;
  for(let i=0;i<n;i++){ num += (xs[i]-meanX)*(series[i]-meanY); den += (xs[i]-meanX)**2; }
  const slope = den!==0?num/den:0; const normalizedSlope = meanY!==0?(slope/meanY*100):0;
  let trend; if(normalizedSlope>5) trend='growing'; else if(normalizedSlope<-5) trend='declining'; else trend='stable';
  return {trend, slope, normalizedSlopePct: normalizedSlope, meanY};
}
function projectForward(series, periodsAhead){
  const n = series.length;
  if(n<2) return {projected:null, confidence:'Low', note:'Not enough history to project.'};
  const xs = series.map((_,i)=>i); const meanX=xs.reduce((a,b)=>a+b,0)/n; const meanY=series.reduce((a,b)=>a+b,0)/n;
  let num=0, den=0;
  for(let i=0;i<n;i++){ num += (xs[i]-meanX)*(series[i]-meanY); den += (xs[i]-meanX)**2; }
  const slope = den!==0?num/den:0; const intercept = meanY-slope*meanX; const nextX=n-1+periodsAhead;
  const projected = Math.max(0, intercept+slope*nextX);
  const residuals = series.map((y,i)=>y-(intercept+slope*i));
  const rmse = Math.sqrt(residuals.reduce((s,r)=>s+r*r,0)/n);
  const noiseRatio = meanY!==0?rmse/meanY:1;
  let confidence; if(noiseRatio<0.15) confidence='High'; else if(noiseRatio<0.35) confidence='Medium'; else confidence='Low';
  return {projected: Math.round(projected), confidence, basis:`linear trend over last ${n} periods`};
}
function driverAnalysis(currentRows, priorRows, groupFn){
  const curB={}, priorB={};
  currentRows.forEach(r=>{ const k=groupFn(r)||'Unspecified'; curB[k]=(curB[k]||0)+1; });
  priorRows.forEach(r=>{ const k=groupFn(r)||'Unspecified'; priorB[k]=(priorB[k]||0)+1; });
  const allKeys = new Set([...Object.keys(curB), ...Object.keys(priorB)]);
  const totalCur=currentRows.length, totalPrior=priorRows.length, totalChange=totalCur-totalPrior;
  const rows = [...allKeys].map(k=>{
    const cur=curB[k]||0, prior=priorB[k]||0, delta=cur-prior;
    const contributionPct = totalChange!==0?(delta/totalChange*100):0;
    const growthPct = prior!==0?(delta/prior*100):(cur>0?Infinity:0);
    return {key:k, cur, prior, delta, contributionPct, growthPct};
  });
  rows.sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta));
  return {totalCur, totalPrior, totalChange, totalGrowthPct: totalPrior!==0?(totalChange/totalPrior*100):(totalCur>0?Infinity:0), drivers:rows};
}
function detectRisks({growthPct, conversionPct, pendingRatioPct, concentrationTopPct, trend}){
  const risks = [];
  if(growthPct!==null && growthPct < -15) risks.push({severity:'High', text:`Volume declined ${Math.abs(growthPct).toFixed(1)}% vs the comparison period — a sharp drop that warrants immediate review.`});
  else if(growthPct!==null && growthPct < -5) risks.push({severity:'Medium', text:`Volume is down ${Math.abs(growthPct).toFixed(1)}% vs the comparison period.`});
  if(conversionPct!==null && conversionPct < 10) risks.push({severity:'High', text:`Conversion rate of ${conversionPct.toFixed(1)}% is critically low.`});
  else if(conversionPct!==null && conversionPct < 20) risks.push({severity:'Medium', text:`Conversion rate of ${conversionPct.toFixed(1)}% is below a healthy range.`});
  if(pendingRatioPct!==null && pendingRatioPct > 45) risks.push({severity:'High', text:`${pendingRatioPct.toFixed(1)}% of cases are stuck in the pipeline — a serious operational bottleneck.`});
  else if(pendingRatioPct!==null && pendingRatioPct > 25) risks.push({severity:'Medium', text:`${pendingRatioPct.toFixed(1)}% of cases are pending — backlog is building.`});
  if(concentrationTopPct!==null && concentrationTopPct > 40) risks.push({severity:'Medium', text:`Top contributor accounts for ${concentrationTopPct.toFixed(1)}% of volume — concentration risk if that entity underperforms.`});
  if(trend==='declining') risks.push({severity:'Medium', text:`Trend is declining over the recent period, independent of any single-period comparison.`});
  if(!risks.length) risks.push({severity:'Low', text:`No material risk flags triggered against current thresholds.`});
  return risks;
}
function detectOpportunities({growthPct, conversionPct, trend, topPerformerGapPct}){
  const opps = [];
  if(growthPct!==null && growthPct > 15) opps.push({text:`Volume growth of ${growthPct.toFixed(1)}% — worth identifying and replicating what's driving this.`});
  if(conversionPct!==null && conversionPct >= 35) opps.push({text:`Conversion rate of ${conversionPct.toFixed(1)}% is strong — this approach/channel may be worth scaling.`});
  if(trend==='growing') opps.push({text:`Sustained growing trend — a good candidate for additional resourcing.`});
  if(topPerformerGapPct!==null && topPerformerGapPct > 30) opps.push({text:`Gap of ${topPerformerGapPct.toFixed(1)}% vs the top performer suggests headroom if best practices are transferred.`});
  if(!opps.length) opps.push({text:`No standout opportunity signal against current thresholds — performance is in line with expectations.`});
  return opps;
}

// ================= VERDICT BADGES =================
function verdictForConversion(pct){
  if(pct>=35) return {tier:'great', emoji:'🔥🚀', text:`${pct.toFixed(1)}% — that's a strong funnel!`};
  if(pct>=20) return {tier:'good', emoji:'👍', text:`${pct.toFixed(1)}% — solid, healthy conversion.`};
  if(pct>=10) return {tier:'mid', emoji:'😐', text:`${pct.toFixed(1)}% — okay, but there's room to push.`};
  return {tier:'bad', emoji:'📉⚠️', text:`${pct.toFixed(1)}% — this needs attention.`};
}
function verdictForGrowth(pct){
  if(pct>=15) return {tier:'great', emoji:'🔥🚀', text:`+${pct.toFixed(1)}% growth — strong momentum!`};
  if(pct>=0) return {tier:'good', emoji:'👍', text:`+${pct.toFixed(1)}% growth — steady progress.`};
  if(pct>=-15) return {tier:'mid', emoji:'😬', text:`${pct.toFixed(1)}% — softening, worth watching.`};
  return {tier:'bad', emoji:'📉🚨', text:`${pct.toFixed(1)}% — a real decline, needs action.`};
}
function verdictBadge(v){ return `<div class="verdict ${v.tier}"><span class="vemoji">${v.emoji}</span><div class="vtext">${escapeHtml(v.text)}</div></div>`; }
function medalFor(i){ if(i===0) return '🥇 '; if(i===1) return '🥈 '; if(i===2) return '🥉 '; return ''; }
function rankClass(i, total){ if(i===0) return 'rank-1'; if(i < Math.ceil(total*0.3)) return 'rank-2'; return 'rank-low'; }
function growthSpan(pct){
  if(pct === Infinity) return `<span class="pos">New</span>`;
  const cls = pct>=0?'pos':'neg';
  const sign = pct>=0?'+':'';
  return `<span class="${cls}">${sign}${pct.toFixed(1)}%</span>`;
}

// ================= EXECUTIVE REPORT BUILDER =================
// Builds rows filtered to a date range + optional entity/group filter.
function rowsInRange(rows, stage, from, to){
  const col = stageDateCol(stage);
  if(!col) return [];
  return rows.filter(r => { const d = parseDate(r[col]); if(!d) return false; if(from||to) return inRange(d, from, to); return true; });
}
function filterByEntity(rows, entity){
  if(!entity) return rows;
  return rows.filter(r => (r[entity.dim.col]||'').trim() === entity.value.trim());
}
function fmtINR(n){ return '₹'+Math.round(n).toLocaleString('en-IN'); }

function buildExecutiveReport(qOriginal){
  const qLower = qOriginal.toLowerCase().trim();
  if(!RAW.length){
    return `<div class="report"><p>No data loaded yet 🕐 — hit "Refresh data" or wait for the initial sync.</p></div>`;
  }

  const entity = detectNamedEntity(qOriginal);
  const explicitGroup = detectGroupCol(qLower);
  const stage = detectStage(qLower);
  const dateSpec = extractDateRange(qLower);

  // Determine current vs prior period. Default to MTD vs LMTD if no explicit range given.
  const now = new Date();
  let curFrom, curTo, priorFrom, priorTo, periodLabel, priorLabel;
  if(dateSpec.from){
    curFrom = dateSpec.from; curTo = dateSpec.to; periodLabel = dateSpec.label;
    priorFrom = dateSpec.priorFrom; priorTo = dateSpec.priorTo; priorLabel = dateSpec.priorLabel;
  } else {
    [curFrom, curTo] = mtdRange(now); periodLabel = 'MTD';
    [priorFrom, priorTo] = lmtdRange(now); priorLabel = 'LMTD';
  }

  let baseRows = RAW;
  let scopeLabel = 'Company-wide';
  if(entity){
    baseRows = filterByEntity(RAW, entity);
    scopeLabel = `${entity.dim.label}: ${entity.value}`;
  }

  const curRows = rowsInRange(baseRows, stage, curFrom, curTo);
  const priorRows = rowsInRange(baseRows, stage, priorFrom, priorTo);
  const growthPct = priorRows.length ? ((curRows.length - priorRows.length)/priorRows.length*100) : (curRows.length>0?Infinity:0);

  // Conversion: lead -> disbursal, scoped to baseRows + current window
  const leadColCur = rowsInRange(baseRows, 'lead', curFrom, curTo);
  const disbColCur = rowsInRange(baseRows, 'disbursal', curFrom, curTo);
  const conversionPct = leadColCur.length ? (disbColCur.length/leadColCur.length*100) : 0;

  // Pending ratio: approved but not disbursed, within baseRows all-time (pipeline snapshot, not date-bound)
  const approvedAll = baseRows.filter(r => parseDate(r[COL.approvalDate]));
  const pendingAll = approvedAll.filter(r => !parseDate(r[COL.disbursalDate]));
  const pendingRatioPct = approvedAll.length ? (pendingAll.length/approvedAll.length*100) : null;

  // Ranking: only meaningful if we have an entity OR an explicit group dimension to rank within
  let rankInfo = null;
  const rankDim = entity ? entity.dim : explicitGroup;
  if(rankDim && rankDim.col){
    const allRows = rowsInRange(RAW, stage, curFrom, curTo);
    const buckets = {};
    allRows.forEach(r => { const k=(r[rankDim.col]||'Unspecified').trim()||'Unspecified'; buckets[k]=(buckets[k]||0)+1; });
    const keyToRank = entity ? entity.value : null;
    if(keyToRank) rankInfo = rankEntity(buckets, keyToRank);
  }

  // Trend: last 6 periods (weekly buckets over ~6 weeks) within baseRows, for the relevant stage
  const dateCol = stageDateCol(stage);
  const series = [];
  for(let i=5;i>=0;i--){
    const wEnd = new Date(now); wEnd.setDate(now.getDate()-i*7);
    const wStart = new Date(wEnd); wStart.setDate(wEnd.getDate()-6);
    const count = baseRows.filter(r => { const d=parseDate(r[dateCol]); return d && d>=wStart && d<=wEnd; }).length;
    series.push(count);
  }
  const trendInfo = classifyTrend(series);
  const projection = projectForward(series, 1);

  // Driver analysis: break down the change by a sub-dimension.
  // If scoped to a named entity, drive by something INSIDE that entity (Dealer, then FOS) —
  // comparing the entity to its peers belongs in Benchmark, not here.
  // If company-wide, drive by the requested group or City as the most natural default.
  let driverDim;
  if(entity){
    if(entity.dim.col === COL.dealerName) driverDim = {col: COL.fos, label:'FOS'};
    else driverDim = {col: COL.dealerName, label:'Dealer'};
  } else {
    driverDim = (explicitGroup && explicitGroup.col) ? explicitGroup : {col: COL.city, label:'City'};
  }
  const drivers = driverDim.col ? driverAnalysis(curRows, priorRows, r => (r[driverDim.col]||'Unspecified').trim()||'Unspecified').drivers.slice(0,5) : [];

  // Amount metrics
  const amtCol = COL.grossDisAmt || COL.loanSanction;
  const curAmt = curRows.reduce((s,r)=>s+toNum(r[amtCol]),0);
  const priorAmt = priorRows.reduce((s,r)=>s+toNum(r[amtCol]),0);
  const amtGrowthPct = priorAmt ? ((curAmt-priorAmt)/priorAmt*100) : (curAmt>0?Infinity:0);

  const concentrationTopPct = drivers.length ? Math.max(...drivers.map(d=>d.cur)) / (curRows.length||1) * 100 : null;
  const risks = detectRisks({growthPct: growthPct===Infinity?null:growthPct, conversionPct, pendingRatioPct, concentrationTopPct, trend: trendInfo.trend});
  const opportunities = detectOpportunities({
    growthPct: growthPct===Infinity?null:growthPct, conversionPct, trend: trendInfo.trend,
    topPerformerGapPct: rankInfo ? Math.abs(rankInfo.vsTopPct) : null
  });

  const stageLabel = stage.charAt(0).toUpperCase()+stage.slice(1);
  const verdict = growthPct===Infinity ? {tier:'great',emoji:'🚀',text:'New activity this period — no prior baseline to compare.'} : verdictForGrowth(growthPct);

  // ---------- Render ----------
  let html = `<div class="report">`;

  html += `<h2>📋 Executive Summary</h2>`;
  html += `<p><b>${escapeHtml(scopeLabel)}</b> — ${stageLabel} volume is <b>${curRows.length.toLocaleString()}</b> for ${escapeHtml(periodLabel)}`;
  html += growthPct===Infinity ? ` (no comparable prior-period data).</p>` : `, ${growthSpan(growthPct)} vs ${escapeHtml(priorLabel)}.</p>`;
  if(rankInfo){
    html += `<p>Ranked <b>#${rankInfo.rank}</b> of ${rankInfo.totalEntities} in ${escapeHtml(rankDim.label)}, ${growthSpan(rankInfo.vsAvgPct)} vs average, ${growthSpan(rankInfo.vsTopPct)} vs top performer (${escapeHtml(rankInfo.topKey||'—')}).</p>`;
  }

  html += `<h2>🎯 Direct Answer</h2>`;
  html += `<p>${stageLabel} count for <b>${escapeHtml(scopeLabel)}</b> in <b>${escapeHtml(periodLabel)}</b>: <b>${curRows.length.toLocaleString()}</b>${curRows.length && amtCol ? ` · Total amount: <b>${fmtINR(curAmt)}</b>` : ''}.</p>`;
  html += verdictBadge(verdict);

  html += `<h2>📊 Key Metrics</h2>`;
  html += `<table class="result"><tr><th>Metric</th><th>${escapeHtml(periodLabel)}</th><th>${escapeHtml(priorLabel)}</th><th>Change</th></tr>`;
  html += `<tr><td>${stageLabel} count</td><td>${curRows.length.toLocaleString()}</td><td>${priorRows.length.toLocaleString()}</td><td>${growthSpan(growthPct)}</td></tr>`;
  html += `<tr><td>Disbursal amount</td><td>${fmtINR(curAmt)}</td><td>${fmtINR(priorAmt)}</td><td>${growthSpan(amtGrowthPct)}</td></tr>`;
  html += `<tr><td>Lead→Disbursal conv.</td><td colspan="3">${conversionPct.toFixed(1)}%</td></tr>`;
  if(pendingRatioPct !== null) html += `<tr><td>Pending (Approved, not disbursed)</td><td colspan="3">${pendingRatioPct.toFixed(1)}% (${pendingAll.length} of ${approvedAll.length})</td></tr>`;
  html += `</table>`;

  html += `<h2>📅 MTD vs LMTD Analysis</h2>`;
  html += `<p>${escapeHtml(periodLabel)} (${curFrom.toLocaleDateString('en-IN')} – ${curTo.toLocaleDateString('en-IN')}) vs ${escapeHtml(priorLabel)} (${priorFrom.toLocaleDateString('en-IN')} – ${priorTo.toLocaleDateString('en-IN')}): ${stageLabel} ${growthSpan(growthPct)}, amount ${growthSpan(amtGrowthPct)}.</p>`;

  html += `<h2>📈 Trend Analysis</h2>`;
  html += `<p>Over the last 6 weekly buckets, the trend is classified as <b>${trendInfo.trend.toUpperCase()}</b> (${trendInfo.normalizedSlopePct>=0?'+':''}${trendInfo.normalizedSlopePct.toFixed(1)}% slope relative to mean level).</p>`;
  const maxS = Math.max(...series, 1);
  series.forEach((v,i) => {
    html += `<div class="bar-row"><span class="bar-label">Week ${i-5===0?'(current)':(i-5)}</span><div class="bar-track"><div class="bar-fill ${rankClass(series.length-1-i, series.length)}" style="width:${v/maxS*100}%"></div></div><span class="bar-val">${v}</span></div>`;
  });
  if(projection.projected !== null){
    html += `<p class="proj-note">📐 Basic projection (linear trend, not a predictive model): next period ≈ <b>${projection.projected}</b> · confidence: <b>${projection.confidence}</b> · basis: ${escapeHtml(projection.basis)}.</p>`;
  }

  if(rankInfo){
    html += `<h2>🏁 Benchmark Analysis</h2>`;
    html += `<p>vs ${escapeHtml(rankDim.label)} average (${rankInfo.avgValue.toFixed(1)}): ${growthSpan(rankInfo.vsAvgPct)} &nbsp;·&nbsp; vs top performer ${escapeHtml(rankInfo.topKey||'—')} (${rankInfo.topValue}): ${growthSpan(rankInfo.vsTopPct)}.</p>`;
  }

  html += `<h2>🔍 Root Cause / Top Drivers</h2>`;
  if(drivers.length){
    html += `<p>Breaking the ${growthPct>=0?'change':'decline'} down by <b>${escapeHtml(driverDim.label)}</b>, ranked by contribution:</p>`;
    html += `<table class="result"><tr><th>${escapeHtml(driverDim.label)}</th><th>${escapeHtml(priorLabel)}</th><th>${escapeHtml(periodLabel)}</th><th>Δ</th><th>Contribution</th></tr>`;
    drivers.forEach(d => {
      html += `<tr><td>${escapeHtml(d.key)}</td><td>${d.prior}</td><td>${d.cur}</td><td>${growthSpan(d.delta)}</td><td>${d.contributionPct.toFixed(1)}%</td></tr>`;
    });
    html += `</table>`;
  } else {
    html += `<p>Not enough data in both periods to break down drivers.</p>`;
  }

  html += `<h2>⚠️ Risks</h2>`;
  risks.forEach(r => { html += `<div class="risk-item ${r.severity}"><span class="badge-sev ${r.severity}">${r.severity}</span><span>${escapeHtml(r.text)}</span></div>`; });

  html += `<h2>💡 Opportunities</h2>`;
  opportunities.forEach(o => { html += `<div class="opp-item">🎯 ${escapeHtml(o.text)}</div>`; });

  html += `<h2>✅ Recommended Actions</h2><ul>`;
  if(risks.some(r=>r.severity==='High')) html += `<li>Prioritize the High-severity risk(s) above within this week — assign an owner.</li>`;
  if(pendingRatioPct !== null && pendingRatioPct > 25) html += `<li>Clear the approval→disbursal backlog; review the top contributing ${escapeHtml(driverDim.label).toLowerCase()} for process delays.</li>`;
  if(conversionPct < 20) html += `<li>Audit the lead→disbursal funnel for the biggest drop-off stage (login vs approval vs disbursal).</li>`;
  if(opportunities.some(o=>o.text.includes('growth'))) html += `<li>Study what's driving the strongest-growing segment and test replicating it elsewhere.</li>`;
  html += `<li>Re-run this analysis next cycle to confirm whether the trend persists.</li>`;
  html += `</ul>`;

  html += `<h2>❓ Leadership Questions</h2><ul>`;
  if(drivers.length){
    const topDriver = drivers[0];
    html += `<li>What changed operationally in <b>${escapeHtml(topDriver.key)}</b> that drove a ${topDriver.delta>=0?'gain':'loss'} of ${Math.abs(topDriver.delta)} ${stage} case${Math.abs(topDriver.delta)===1?'':'s'}?</li>`;
  }
  if(rankInfo && rankInfo.rank > 1) html += `<li>What is ${escapeHtml(rankInfo.topKey||'the top performer')} doing differently that ${escapeHtml(scopeLabel)} could adopt?</li>`;
  html += `<li>Is the ${trendInfo.trend} trend driven by demand, capacity, or process — and which lever should leadership pull?</li>`;
  html += `</ul>`;

  html += `</div>`;
  return html;
}

// ================= CHAT UI =================
function addUser(text){
  const div = document.createElement('div'); div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  chatEl.appendChild(div); chatEl.scrollTop = chatEl.scrollHeight;
}
function addBot(html){
  const div = document.createElement('div'); div.className = 'msg bot';
  div.innerHTML = `<div class="bot-icon">🤖</div><div class="bubble">${html}</div>`;
  chatEl.appendChild(div); chatEl.scrollTop = chatEl.scrollHeight;
}
function welcomeMessage(){
  addBot(`Hey Kushagra! 👋✨ Connected to <b>New_Raw_Data</b> in Executive Intelligence mode — every question gets a full business breakdown (metrics, MTD vs LMTD, trend, drivers, risks, opportunities, actions). Try:
  <div class="hint-chips">
    <span class="chip" data-q="Bharat Car Bazaar disbursals">🏢 Bharat Car Bazaar disbursals</span>
    <span class="chip" data-q="disbursals this month by FOS">🚀 disbursals this month by FOS</span>
    <span class="chip" data-q="lead to disbursal conversion rate">📈 conversion rate</span>
    <span class="chip" data-q="why did Kanpur drop this month">🔍 why did Kanpur drop this month</span>
    <span class="chip" data-q="CEO summary">📋 CEO summary</span>
  </div>`);
  attachChipHandlers();
}
function attachChipHandlers(){
  document.querySelectorAll('.chip').forEach(c => { c.onclick = () => { qInput.value = c.dataset.q; handleSend(); }; });
}
function handleSend(){
  const text = qInput.value.trim();
  if(!text) return;
  addUser(text);
  qInput.value = ''; qInput.style.height = 'auto';
  try{
    const html = buildExecutiveReport(text);
    addBot(html);
  }catch(e){
    addBot(`<span class="err">😵‍💫 Hit an error building that analysis: ${escapeHtml(e.message)}</span>`);
  }
}
sendBtn.onclick = handleSend;
qInput.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); handleSend(); } });
qInput.addEventListener('input', () => { qInput.style.height='auto'; qInput.style.height = Math.min(qInput.scrollHeight,90)+'px'; });
refreshBtn.onclick = () => loadData(true);

(async function init(){
  welcomeMessage();
  await loadData(false);
})();
</script>
</body>
