// Levenshtein edit distance, used as a typo-tolerant fallback when exact/token matching
// finds nothing -- e.g. "Bharat Car Bazar" (missing an 'a') should still suggest
// "Bharat Car Bazaar" rather than returning no match at all.
function levenshtein(a, b){
  const m = a.length, n = b.length;
  if(m === 0) return n;
  if(n === 0) return m;
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));
  for(let i=0;i<=m;i++) dp[i][0] = i;
  for(let j=0;j<=n;j++) dp[0][j] = j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      if(a[i-1] === b[j-1]) dp[i][j] = dp[i-1][j-1];
      else dp[i][j] = 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}
function stringSimilarity(a, b){
  const dist = levenshtein(a, b);
  const maxLen = Math.max(a.length, b.length);
  return maxLen === 0 ? 1 : 1 - dist/maxLen;
}

// Business-defined filter groups (per spec): these aren't single column values, they're
// named groupings that span multiple channel/source values. Checked against CHANNEL,
// DS_CHANNEL, and SOURCE columns (whichever exist), case-insensitively, since the exact
// column holding "Cars24"/"Bajaj"/"PMAX" text isn't fixed.
function detectBusinessFilter(qLower){
  if(/\bown\s*book\b/.test(qLower)){
    return {
      label: 'Own Book (Cars24 + Bajaj)',
      test: (row) => {
        const fields = [COL.channel, COL.dsChannel, COL.source].filter(Boolean).map(c => (row[c]||'').toLowerCase());
        return fields.some(v => v.includes('cars24') || v.includes('bajaj'));
      }
    };
  }
  if(/\bpmax\b|\bp[\-\s]?max\b/.test(qLower)){
    return {
      label: 'PMax',
      test: (row) => {
        const fields = [COL.channel, COL.dsChannel, COL.source].filter(Boolean).map(c => (row[c]||'').toLowerCase());
        return fields.some(v => v.includes('pmax'));
      }
    };
  }
  return null;
}

// Find a specific named entity mentioned in the query by scanning all rows'
// dealer/FOS/SM/RSM/city/region values for a fuzzy match against the query text.
function detectNamedEntity(qOriginal){
  const dims = [
    {col: COL.dealerCode, label:'Dealer Code'},
    {col: COL.dealerName, label:'Dealer'},
    {col: COL.fos, label:'FOS'},
    {col: COL.sm, label:'SM'},
    {col: COL.rsm, label:'RSM'},
    {col: COL.asm, label:'ASM'},
    {col: COL.rm, label:'RM'},
    {col: COL.tl, label:'TL'},
    {col: COL.tlHead, label:'TL Head'},
    {col: COL.city, label:'City'},
    {col: COL.region, label:'Region'},
    {col: COL.channel, label:'Channel'},
    {col: COL.dsChannel, label:'DS Channel'},
    {col: COL.make, label:'Make'},
    {col: COL.model, label:'Model'},
    {col: COL.source, label:'Source'},
  ];
  const qLower = qOriginal.toLowerCase();
  // Strip common stopwords/intent words so they don't pollute token matching
  const stop = new Set(['disbursal','disbursals','disbursed','this','month','last','week','today','for',
    'sm','rsm','asm','rm','fos','tl','wise','by','of','in','on','the','give','me','show','what','is','are',
    'conversion','rate','total','amount','pending','approval','approved','login','logins','lead','leads']);
  const qTokens = qLower.replace(/[^a-z0-9. ]/g,' ').split(/\s+/).filter(t => t && !stop.has(t));

  let candidates = [];
  for(const dim of dims){
    if(!dim.col) continue;
    const values = new Set(RAW.map(r => r[dim.col]).filter(Boolean));
    for(const val of values){
      const v = val.toLowerCase().trim();
      if(v.length < 2) continue;
      const vTokens = v.split(/\s+/).filter(Boolean);

      // Match A: the full value appears verbatim in the query (handles multi-word names
      // like "bharat car bazaar" typed in full).
      const fullPhraseMatch = qLower.includes(v) && v.length >= 4;

      // Match B: every token of the value is present as a whole word among the query's
      // remaining tokens (handles "Manu disbursals" matching RSM value "Manu Nair" partially —
      // here at least one strong token, first name, must match a query token exactly).
      const tokenOverlap = vTokens.filter(vt => qTokens.includes(vt));
      const strongTokenMatch = tokenOverlap.length > 0 && tokenOverlap.some(t => t.length >= 3);

      if(fullPhraseMatch || strongTokenMatch){
        // score: prefer full-phrase matches, then more overlapping tokens, then longer values
        const score = (fullPhraseMatch ? 1000 : 0) + tokenOverlap.length*10 + v.length;
        candidates.push({dim, value: val, score, exact: fullPhraseMatch || tokenOverlap.length === vTokens.length});
      }
    }
  }
  if(!candidates.length){
    // Nothing matched exactly or by token -- try a typo-tolerant fallback so a misspelled
    // name (e.g. "Bharat Car Bazar" instead of "Bharat Car Bazaar") still gets a suggestion
    // instead of silently returning nothing. Only fires against multi-word query phrases of
    // reasonable length, compared against full entity values, to avoid noisy single-word
    // false positives (e.g. "this" fuzzy-matching some unrelated 4-letter dealer code).
    const candidatePhrase = qOriginal.replace(/[^a-zA-Z0-9. ]/g,' ').trim();
    if(candidatePhrase.length < 4) return null;
    const fuzzyMatches = [];
    for(const dim of dims){
      if(!dim.col) continue;
      const values = new Set(RAW.map(r => r[dim.col]).filter(Boolean));
      for(const val of values){
        const v = val.toLowerCase().trim();
        if(v.length < 4) continue;
        // Compare the value against every plausible substring window of the query of
        // similar length, not just the whole query, so a long sentence doesn't dilute the score.
        const words = qLower.replace(/[^a-z0-9. ]/g,' ').split(/\s+/).filter(Boolean);
        let bestWindowScore = 0;
        const vWordCount = v.split(/\s+/).length;
        for(let start=0; start<=words.length-vWordCount && start<words.length; start++){
          const window = words.slice(start, start+vWordCount).join(' ');
          const score = stringSimilarity(window, v);
          if(score > bestWindowScore) bestWindowScore = score;
        }
        if(bestWindowScore >= 0.7){
          fuzzyMatches.push({dim, value: val, score: bestWindowScore});
        }
      }
    }
    if(!fuzzyMatches.length) return null;
    fuzzyMatches.sort((a,b) => b.score - a.score);
    // Very close match (likely just a typo) -- use it directly but flag it as a correction.
    if(fuzzyMatches[0].score >= 0.85 && (fuzzyMatches.length===1 || fuzzyMatches[0].score - fuzzyMatches[1].score >= 0.1)){
      return {...fuzzyMatches[0], exact:true, corrected:true};
    }
    // Otherwise, several plausible near-misses -- ask which one was meant.
    const distinctFuzzy = [...new Map(fuzzyMatches.map(c => [c.value, c])).values()].slice(0,5);
    return {ambiguous:true, options: distinctFuzzy, didYouMean:true};
  }
  candidates.sort((a,b) => b.score - a.score);

  // If there are multiple partial (non-exact-phrase) matches that aren't clearly separated,
  // treat it as ambiguous rather than silently picking the longer string. "Partial" here means
  // matched via token overlap but not the full value appearing verbatim in the query.
  const partialMatches = candidates.filter(c => !c.exact);
  const exactMatches = candidates.filter(c => c.exact);
  if(exactMatches.length){
    // An exact full-phrase/full-token match always wins outright — no ambiguity.
    exactMatches.sort((a,b) => b.score - a.score);
    return exactMatches[0];
  }
  if(partialMatches.length > 1){
    // Multiple distinct entities partially matched the same query token(s) — ask rather than guess.
    const distinctValues = [...new Map(partialMatches.map(c => [c.value, c])).values()];
    if(distinctValues.length > 1){
      return {ambiguous:true, options: distinctValues.slice(0,5)};
    }
  }
  // Single partial match: only flag as "corrected" if the match is a likely typo of a longer
  // name (the matched value is mostly similar to a same-length window of the query, just not
  // identical) -- NOT for legitimate short/partial references like "Manu" correctly matching
  // "Manu Nair" by first name alone, which is intentional brevity, not a misspelling.
  const winner = candidates[0];
  if(winner){
    const winnerVal = winner.value.toLowerCase().trim();
    const alreadyVerbatim = qLower.includes(winnerVal);
    if(!alreadyVerbatim){
      // Compare the full value against the best-matching same-length window of the query.
      const qWords = qLower.replace(/[^a-z0-9. ]/g,' ').split(/\s+/).filter(Boolean);
      const vWordCount = winnerVal.split(/\s+/).length;
      let bestWindowScore = 0;
      for(let start=0; start<=qWords.length-vWordCount && start<qWords.length; start++){
        const window = qWords.slice(start, start+vWordCount).join(' ');
        const score = stringSimilarity(window, winnerVal);
        if(score > bestWindowScore) bestWindowScore = score;
      }
      // High similarity on a same-length window (e.g. "bharat car bazar" vs "bharat car bazaar")
      // means a typo of the full name -- worth flagging. A short single-word reference like
      // "manu" compared against "manu nair" (different word counts) won't score this high
      // since the window comparison itself is on mismatched lengths.
      if(bestWindowScore >= 0.75){
        return {...winner, corrected:true};
      }
    }
  }
  return winner;
}

// ================= RANK / TREND / DRIVER / RISK ENGINES =================
function rankEntity(allBuckets, entityKey){
  const sorted = Object.entries(allBuckets).sort((a,b)=>b[1]-a[1]);
  const rank = sorted.findIndex(([k])=>k===entityKey)+1;
  const total = sorted.length;
  const topVal = sorted.length?sorted[0][1]:0;
  const avgVal = sorted.length?sorted.reduce((s,[,v])=>s+v,0)/sorted.length:0;
  const entityVal = allBuckets[entityKey]||0;
  return {rank, totalEntities:total, value:entityVal, topValue:topVal, topKey:sorted[0]?.[0], avgValue:avgVal,
    vsAvgPct: avgVal?((entityVal-avgVal)/avgVal*100):0, vsTopPct: topVal?((entityVal-topVal)/topVal*100):0};
}
function classifyTrend(series){
  const n = series.length;
  if(n<2) return {trend:'insufficient_data', normalizedSlopePct:0};
  const xs = series.map((_,i)=>i); const meanX=xs.reduce((a,b)=>a+b,0)/n; const meanY=series.reduce((a,b)=>a+b,0)/n;
  let num=0, den=0;
  for(let i=0;i<n;i++){ num += (xs[i]-meanX)*(series[i]-meanY); den += (xs[i]-meanX)**2; }
  const slope = den!==0?num/den:0; const normalizedSlope = meanY!==0?(slope/meanY*100):0;
  let trend; if(normalizedSlope>5) trend='growing'; else if(normalizedSlope<-5) trend='declining'; else trend='stable';
  return {trend, slope, normalizedSlopePct: normalizedSlope, meanY};
}
function projectForward(series, periodsAhead){
  const n = series.length;
  if(n<2) return {projected:null, confidence:'Low', note:'Not enough history to project.'};
  const xs = series.map((_,i)=>i); const meanX=xs.reduce((a,b)=>a+b,0)/n; const meanY=series.reduce((a,b)=>a+b,0)/n;
  let num=0, den=0;
  for(let i=0;i<n;i++){ num += (xs[i]-meanX)*(series[i]-meanY); den += (xs[i]-meanX)**2; }
  const slope = den!==0?num/den:0; const intercept = meanY-slope*meanX; const nextX=n-1+periodsAhead;
  const projected = Math.max(0, intercept+slope*nextX);
  const residuals = series.map((y,i)=>y-(intercept+slope*i));
  const rmse = Math.sqrt(residuals.reduce((s,r)=>s+r*r,0)/n);
  const noiseRatio = meanY!==0?rmse/meanY:1;
  let confidence; if(noiseRatio<0.15) confidence='High'; else if(noiseRatio<0.35) confidence='Medium'; else confidence='Low';
  return {projected: Math.round(projected), confidence, basis:`linear trend over last ${n} periods`};
}
function driverAnalysis(currentRows, priorRows, groupFn){
  const curB={}, priorB={};
  currentRows.forEach(r=>{ const k=groupFn(r)||'Unspecified'; curB[k]=(curB[k]||0)+1; });
  priorRows.forEach(r=>{ const k=groupFn(r)||'Unspecified'; priorB[k]=(priorB[k]||0)+1; });
  const allKeys = new Set([...Object.keys(curB), ...Object.keys(priorB)]);
  const totalCur=currentRows.length, totalPrior=priorRows.length, totalChange=totalCur-totalPrior;
  const rows = [...allKeys].map(k=>{
    const cur=curB[k]||0, prior=priorB[k]||0, delta=cur-prior;
    const contributionPct = totalChange!==0?(delta/totalChange*100):0;
    const growthPct = prior!==0?(delta/prior*100):(cur>0?Infinity:0);
    return {key:k, cur, prior, delta, contributionPct, growthPct};
  });
  rows.sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta));
  return {totalCur, totalPrior, totalChange, totalGrowthPct: totalPrior!==0?(totalChange/totalPrior*100):(totalCur>0?Infinity:0), drivers:rows};
}
function detectRisks({growthPct, conversionPct, pendingRatioPct, concentrationTopPct, trend}){
  const risks = [];
  if(growthPct!==null && growthPct < -15) risks.push({severity:'High', text:`Volume declined ${Math.abs(growthPct).toFixed(1)}% vs the comparison period — a sharp drop that warrants immediate review.`});
  else if(growthPct!==null && growthPct < -5) risks.push({severity:'Medium', text:`Volume is down ${Math.abs(growthPct).toFixed(1)}% vs the comparison period.`});
  if(conversionPct!==null && conversionPct < 10) risks.push({severity:'High', text:`Conversion rate of ${conversionPct.toFixed(1)}% is critically low.`});
  else if(conversionPct!==null && conversionPct < 20) risks.push({severity:'Medium', text:`Conversion rate of ${conversionPct.toFixed(1)}% is below a healthy range.`});
  if(pendingRatioPct!==null && pendingRatioPct > 45) risks.push({severity:'High', text:`${pendingRatioPct.toFixed(1)}% of cases are stuck in the pipeline — a serious operational bottleneck.`});
  else if(pendingRatioPct!==null && pendingRatioPct > 25) risks.push({severity:'Medium', text:`${pendingRatioPct.toFixed(1)}% of cases are pending — backlog is building.`});
  if(concentrationTopPct!==null && concentrationTopPct > 40) risks.push({severity:'Medium', text:`Top contributor accounts for ${concentrationTopPct.toFixed(1)}% of volume — concentration risk if that entity underperforms.`});
  if(trend==='declining') risks.push({severity:'Medium', text:`Trend is declining over the recent period, independent of any single-period comparison.`});
  if(!risks.length) risks.push({severity:'Low', text:`No material risk flags triggered against current thresholds.`});
  return risks;
}
function detectOpportunities({growthPct, conversionPct, trend, topPerformerGapPct}){
  const opps = [];
  if(growthPct!==null && growthPct > 15) opps.push({text:`Volume growth of ${growthPct.toFixed(1)}% — worth identifying and replicating what's driving this.`});
  if(conversionPct!==null && conversionPct >= 35) opps.push({text:`Conversion rate of ${conversionPct.toFixed(1)}% is strong — this approach/channel may be worth scaling.`});
  if(trend==='growing') opps.push({text:`Sustained growing trend — a good candidate for additional resourcing.`});
  if(topPerformerGapPct!==null && topPerformerGapPct > 30) opps.push({text:`Gap of ${topPerformerGapPct.toFixed(1)}% vs the top performer suggests headroom if best practices are transferred.`});
  if(!opps.length) opps.push({text:`No standout opportunity signal against current thresholds — performance is in line with expectations.`});
  return opps;
}

// ================= VERDICT BADGES =================
function verdictForConversion(pct){
  if(pct>=35) return {tier:'great', emoji:'🔥🚀', text:`${pct.toFixed(1)}% — that's a strong funnel!`};
  if(pct>=20) return {tier:'good', emoji:'👍', text:`${pct.toFixed(1)}% — solid, healthy conversion.`};
  if(pct>=10) return {tier:'mid', emoji:'😐', text:`${pct.toFixed(1)}% — okay, but there's room to push.`};
  return {tier:'bad', emoji:'📉⚠️', text:`${pct.toFixed(1)}% — this needs attention.`};
}
function verdictForGrowth(pct){
  if(pct>=15) return {tier:'great', emoji:'🔥🚀', text:`+${pct.toFixed(1)}% growth — strong momentum!`};
  if(pct>=0) return {tier:'good', emoji:'👍', text:`+${pct.toFixed(1)}% growth — steady progress.`};
  if(pct>=-15) return {tier:'mid', emoji:'😬', text:`${pct.toFixed(1)}% — softening, worth watching.`};
  return {tier:'bad', emoji:'📉🚨', text:`${pct.toFixed(1)}% — a real decline, needs action.`};
}
function verdictBadge(v){ return `<div class="verdict ${v.tier}"><span class="vemoji">${v.emoji}</span><div class="vtext">${escapeHtml(v.text)}</div></div>`; }
function medalFor(i){ if(i===0) return '🥇 '; if(i===1) return '🥈 '; if(i===2) return '🥉 '; return ''; }
function rankClass(i, total){ if(i===0) return 'rank-1'; if(i < Math.ceil(total*0.3)) return 'rank-2'; return 'rank-low'; }
function growthSpan(pct){
  if(pct === Infinity) return `<span class="pos">New</span>`;
  const cls = pct>=0?'pos':'neg';
  const sign = pct>=0?'+':'';
  return `<span class="${cls}">${sign}${pct.toFixed(1)}%</span>`;
}

// ================= BUSINESS TERMINOLOGY ENGINE =================
// Maps standard lending/business vocabulary to the actual computation this schema supports.
// Every term here is tied to a real column or a real derived ratio -- nothing invented.
// If a term has no real backing column (e.g. true "profit"/"revenue" isn't in this sheet,
// only PF_AMOUNT/loan economics are), it's explicitly flagged rather than guessed.
const BUSINESS_GLOSSARY = {
  mtd:        {pattern:/\bmtd\b|\bmonth.?to.?date\b/, label:'MTD (Month-to-Date)'},
  lmtd:       {pattern:/\blmtd\b/, label:'LMTD (Last Month-to-Date, same day-of-month)'},
  qtd:        {pattern:/\bqtd\b|\bquarter.?to.?date\b/, label:'QTD (Quarter-to-Date)'},
  lqtd:       {pattern:/\blqtd\b/, label:'LQTD (Last Quarter-to-Date)'},
  ytd:        {pattern:/\bytd\b|\byear.?to.?date\b/, label:'YTD (Year-to-Date)'},
  lytd:       {pattern:/\blytd\b/, label:'LYTD (Last Year-to-Date)'},
  wow:        {pattern:/\bwow\b|week.?over.?week/, label:'WoW (Week-over-Week)'},
  mom:        {pattern:/\bmom\b|month.?over.?month/, label:'MoM (Month-over-Month)'},
  qoq:        {pattern:/\bqoq\b|quarter.?over.?quarter/, label:'QoQ (Quarter-over-Quarter)'},
  yoy:        {pattern:/\byoy\b|year.?over.?year/, label:'YoY (Year-over-Year)'},
  aov:        {pattern:/\baov\b|average ticket|ticket size|average (loan|deal) size/, label:'AOV / Avg Ticket Size', metric:'avgTicket'},
  ltv:        {pattern:/\bltv\b(?!.{0,15}customer)|loan.?to.?value/, label:'LTV (Loan-to-Value)', metric:'ltv'},
  roi:        {pattern:/\broi\b(?!.{0,10}return on investment)|rate of interest|interest rate/, label:'ROI (Rate of Interest)', metric:'roi'},
  cibil:      {pattern:/\bcibil\b|credit score/, label:'CIBIL Score', metric:'cibil'},
  npa_proxy:  {pattern:/\bnpa\b|non.?performing|default rate/, label:'NPA-style risk proxy', metric:'npaProxy'},
  pf:         {pattern:/\bprocessing fee\b|\bpf amount\b|\bpf\b/, label:'PF (Processing Fee) Amount', metric:'pfTotal'},
  sanction:   {pattern:/sanction(ed)? amount|loan sanction/, label:'Loan Sanction Amount', metric:'sanctionTotal'},
  disbursalAmt:{pattern:/disbursal amount|disbursed amount|gross dis(bursal)?/, label:'Gross Disbursal Amount', metric:'disbursalTotal'},
  tenure:     {pattern:/\btenure\b/, label:'Loan Tenure', metric:'tenure'},
  loginConversion:{pattern:/login conversion|lead.?to.?login/, label:'Login Conversion (Login \u00f7 Lead)', metric:'loginConversion'},
  conversion: {pattern:/\bconversion\b|\bconvert(ed)?\b|funnel rate/, label:'Lead\u2192Disbursal Conversion Rate', metric:'conversion'},
  approvalRate:{pattern:/approval rate|approval conversion|login.?to.?approval/, label:'Approval Conversion (Approval \u00f7 Login)', metric:'approvalRate'},
  disbursalRate:{pattern:/approval.?to.?disbursal/, label:'Approval To Disbursal (Disbursal \u00f7 Approval)', metric:'disbursalRate'},
  disbursalConversion:{pattern:/disbursal conversion|disbursal rate(?!.{0,15}approval)/, label:'Disbursal Conversion (Disbursal \u00f7 Login)', metric:'disbursalConversion'},
  pendency:   {pattern:/\bpending\b|\bpendency\b|\bstuck\b|\bbacklog\b|\baging\b/, label:'Pendency / Backlog', metric:'pendency'},
  marketShare:{pattern:/market share|contribution %|contribution percent/, label:'Contribution / Market Share', metric:'marketShare'},
  redFlagRate:{pattern:/red flag|flagged rate/, label:'Red-Flag Rate', metric:'redFlagRate'},
  bankingPenetration:{pattern:/banking (requirement|penetration)|banking flag/, label:'Banking Requirement Penetration', metric:'bankingPenetration'},
  nbfcMix:    {pattern:/\bnbfc\b/, label:'NBFC Mix', metric:'nbfcMix'},
  // Terms people may reasonably ask about that this sheet genuinely cannot answer —
  // listed explicitly so the bot says so instead of staying silent.
  profit:     {pattern:/\bprofit\b|\bmargin\b/, label:'Profit / Margin', metric:null},
  revenue:    {pattern:/\brevenue\b/, label:'Revenue', metric:null},
  roi_business:{pattern:/\breturn on investment\b/, label:'Return on Investment (business)', metric:null},
  npaActual:  {pattern:/\bdefault status\b|\bwrite.?off\b/, label:'Actual NPA / Default / Write-off status', metric:null},
};
function detectGlossaryTerms(qLower){
  const hits = [];
  for(const [key, def] of Object.entries(BUSINESS_GLOSSARY)){
    if(def.pattern.test(qLower)) hits.push({key, ...def});
  }
  return hits;
}
// Compute a glossary metric over a given row-set. Returns {value, display, note} or null if
// the underlying column isn't present in this sheet (so we say so, instead of guessing).
// funnelData (optional) = {lead, login, approval, disbursal} row arrays for the SAME window,
// needed for cross-stage ratios (conversion, approval rate, etc.) that a single row-set can't answer.
function computeGlossaryMetric(metricKey, rows, funnelData){
  const n = rows.length;
  const avg = (col) => { const vals = rows.map(r=>toNum(r[col])).filter(v=>v>0); return vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : 0; };
  const sum = (col) => rows.reduce((s,r)=>s+toNum(r[col]),0);
  switch(metricKey){
    case 'avgTicket': {
      const col = COL.grossDisAmt || COL.loanSanction;
      if(!col) return null;
      return {value: avg(col), display: fmtINR(avg(col)), note:`Average of ${col} across ${n} record(s).`};
    }
    case 'ltv': {
      const col = COL.finalOfferLtv || COL.systemLtv;
      if(!col) return null;
      return {value: avg(col), display: avg(col).toFixed(1)+'%', note:`Average ${col} across ${n} record(s).`};
    }
    case 'roi': {
      const col = COL.dsRoi || COL.roiPerAnnum;
      if(!col) return null;
      return {value: avg(col), display: avg(col).toFixed(2)+'%', note:`Average ${col} across ${n} record(s).`};
    }
    case 'cibil': {
      if(!COL.cibil) return null;
      return {value: avg(COL.cibil), display: avg(COL.cibil).toFixed(0), note:`Average CIBIL_SCORE_TEMP across ${n} record(s) with a score recorded.`};
    }
    case 'npaProxy': {
      if(!COL.riskBucket) return null;
      const highRisk = rows.filter(r => /\b(high|red|critical)\b/i.test(r[COL.riskBucket]||''));
      const pct = n ? highRisk.length/n*100 : 0;
      return {value: pct, display: pct.toFixed(1)+'%', note:`Share of records in a High/Red/Critical RISK_BUCKET, as a directional proxy — this sheet has no formal NPA/default-status column, so this is the closest available signal.`};
    }
    case 'pfTotal': {
      if(!COL.pfAmount) return null;
      return {value: sum(COL.pfAmount), display: fmtINR(sum(COL.pfAmount)), note:`Sum of PF_AMOUNT across ${n} record(s).`};
    }
    case 'sanctionTotal': {
      if(!COL.loanSanction) return null;
      return {value: sum(COL.loanSanction), display: fmtINR(sum(COL.loanSanction)), note:`Sum of LOAN_SANCTION across ${n} record(s).`};
    }
    case 'disbursalTotal': {
      if(!COL.grossDisAmt) return null;
      return {value: sum(COL.grossDisAmt), display: fmtINR(sum(COL.grossDisAmt)), note:`Sum of GROSS_DIS_AMT across ${n} record(s).`};
    }
    case 'tenure': {
      const col = COL.dsTenure || COL.loanTenure || COL.tenure;
      if(!col) return null;
      return {value: avg(col), display: avg(col).toFixed(1)+' months (approx.)', note:`Average ${col} across ${n} record(s).`};
    }
    case 'redFlagRate': {
      if(!COL.redFlag) return null;
      const flagged = rows.filter(r => isFlagTrue(r[COL.redFlag]));
      const pct = n? flagged.length/n*100 : 0;
      return {value: pct, display: pct.toFixed(1)+'%', note:`${flagged.length} of ${n} record(s) flagged RED_FLAG = Yes.`};
    }
    case 'bankingPenetration': {
      if(!COL.bankingRequired && !COL.bankingFlag) return null;
      const col = COL.bankingRequired || COL.bankingFlag;
      const flagged = rows.filter(r => isFlagTrue(r[col]));
      const pct = n? flagged.length/n*100 : 0;
      return {value: pct, display: pct.toFixed(1)+'%', note:`${flagged.length} of ${n} record(s) have ${col} = Yes.`};
    }
    case 'nbfcMix': {
      if(!COL.nbfcFlag) return null;
      const buckets = {};
      rows.forEach(r => { const k=(r[COL.nbfcFlag]||'Unspecified').trim()||'Unspecified'; buckets[k]=(buckets[k]||0)+1; });
      return {value: buckets, display: Object.entries(buckets).map(([k,v])=>`${k}: ${v}`).join(', '), note:`Breakdown of NBFC Flag across ${n} record(s).`};
    }
    case 'loginConversion': {
      if(!funnelData) return null;
      const leadN = funnelData.lead.length, loginN = funnelData.login.length;
      const pct = leadN ? loginN/leadN*100 : 0;
      return {value: pct, display: pct.toFixed(1)+'%', note:`${loginN} logged in of ${leadN} lead(s) in this window.`};
    }
    case 'conversion': {
      if(!funnelData) return null;
      const leadN = funnelData.lead.length, disbN = funnelData.disbursal.length;
      const pct = leadN ? disbN/leadN*100 : 0;
      return {value: pct, display: pct.toFixed(1)+'%', note:`${disbN} disbursed of ${leadN} lead(s) in this window.`};
    }
    case 'approvalRate': {
      if(!funnelData) return null;
      const loginN = funnelData.login.length, apprN = funnelData.approval.length;
      const pct = loginN ? apprN/loginN*100 : 0;
      return {value: pct, display: pct.toFixed(1)+'%', note:`${apprN} approved of ${loginN} login(s) in this window.`};
    }
    case 'disbursalRate': {
      if(!funnelData) return null;
      const apprN = funnelData.approval.length, disbN = funnelData.disbursal.length;
      const pct = apprN ? disbN/apprN*100 : 0;
      return {value: pct, display: pct.toFixed(1)+'%', note:`${disbN} disbursed of ${apprN} approval(s) in this window.`};
    }
    case 'disbursalConversion': {
      if(!funnelData) return null;
      const loginN = funnelData.login.length, disbN = funnelData.disbursal.length;
      const pct = loginN ? disbN/loginN*100 : 0;
      return {value: pct, display: pct.toFixed(1)+'%', note:`${disbN} disbursed of ${loginN} login(s) in this window. (Per spec: Disbursal \u00f7 Login, not \u00f7 Approval.)`};
    }
    case 'pendency': {
      // Pipeline snapshot (approved but not yet disbursed) -- not date-windowed, since a
      // pending case by definition has no disbursal date to filter by.
      const approvedAll = rows.filter(r => parseDate(r[COL.approvalDate]));
      const pendingAll = approvedAll.filter(r => !parseDate(r[COL.disbursalDate]));
      if(!approvedAll.length) return {value:0, display:'0.0%', note:'No approved records in scope to measure pendency against.'};
      const pct = pendingAll.length/approvedAll.length*100;
      return {value: pct, display: pct.toFixed(1)+'%', note:`${pendingAll.length} of ${approvedAll.length} approved record(s) still not disbursed.`};
    }
    case 'marketShare': {
      // Market share/contribution only means something relative to a named entity or group —
      // that calculation already lives in the Benchmark Analysis section using real rank data.
      // Returning a fabricated single number here would be less accurate than pointing there.
      return {value: null, display: 'See Benchmark Analysis', note: `Contribution/market-share is computed relative to peers — check the Benchmark Analysis section above if an entity or group was specified.`};
    }
    default: return null;
  }
}

// ================= EXECUTIVE REPORT BUILDER =================
// Builds rows filtered to a date range + optional entity/group filter.
function rowsInRange(rows, stage, from, to){
  const col = stageDateCol(stage);
  if(!col) return [];
  return rows.filter(r => { const d = parseDate(r[col]); if(!d) return false; if(from||to) return inRange(d, from, to); return true; });
}
function filterByEntity(rows, entity){
  if(!entity) return rows;
  return rows.filter(r => (r[entity.dim.col]||'').trim() === entity.value.trim());
}
function fmtINR(n){ return '₹'+Math.round(n).toLocaleString('en-IN'); }

// Builds a report covering ALL funnel stages (Lead, Login, Approval, Disbursal) when the
// query didn't name a specific one. This is the fix for "only fetching disbursal data" --
// previously detectStage() silently defaulted to 'disbursal' for any unrecognized phrasing.
function buildFullFunnelReport({baseRows, scopeLabel, entity, explicitGroup, curFrom, curTo, priorFrom, priorTo, periodLabel, priorLabel, qLower, now, correctionNote}){
  const stages = ['lead','login','approval','disbursal'];
  const stageEmoji = {lead:'📥', login:'🔐', approval:'✅', disbursal:'💸'};
  // Track which stages actually have a backing date column in this sheet -- a stage with
  // no column must never be silently rendered as "0", since that's indistinguishable from
  // a genuine zero. Missing-data is reported explicitly instead.
  const missingStages = stages.filter(s => !stageDateCol(s));
  const data = {};
  stages.forEach(s => {
    if(!stageDateCol(s)){ data[s] = {cur:[], prior:[], growth:0, missing:true}; return; }
    const cur = rowsInRange(baseRows, s, curFrom, curTo);
    const prior = rowsInRange(baseRows, s, priorFrom, priorTo);
    const growth = prior.length ? ((cur.length-prior.length)/prior.length*100) : (cur.length>0?Infinity:0);
    data[s] = {cur, prior, growth, missing:false};
  });

  const conversionPct = data.lead.cur.length ? (data.disbursal.cur.length/data.lead.cur.length*100) : 0;
  const approvalRatePct = data.login.cur.length ? (data.approval.cur.length/data.login.cur.length*100) : 0;
  const disbursalRatePct = data.approval.cur.length ? (data.disbursal.cur.length/data.approval.cur.length*100) : 0;

  const approvedAll = baseRows.filter(r => parseDate(r[COL.approvalDate]));
  const pendingAll = approvedAll.filter(r => !parseDate(r[COL.disbursalDate]));
  const pendingRatioPct = approvedAll.length ? (pendingAll.length/approvedAll.length*100) : null;

  // Rank on disbursal by default for the headline rank (most business-relevant stage),
  // but only if we have an entity or explicit group to rank within.
  let rankInfo = null;
  const rankDim = entity ? entity.dim : explicitGroup;
  if(rankDim && rankDim.col){
    const allRows = rowsInRange(RAW, 'disbursal', curFrom, curTo);
    const buckets = {};
    allRows.forEach(r => { const k=(r[rankDim.col]||'Unspecified').trim()||'Unspecified'; buckets[k]=(buckets[k]||0)+1; });
    const keyToRank = entity ? entity.value : null;
    if(keyToRank) rankInfo = rankEntity(buckets, keyToRank);
  }

  // Trend per stage, last 6 weekly buckets
  const seriesByStage = {};
  stages.forEach(s => {
    const dateCol = stageDateCol(s);
    if(!dateCol){ seriesByStage[s] = {series:[], trend:{trend:'no_data', normalizedSlopePct:0}, projection:{projected:null, confidence:'Low'}, missing:true}; return; }
    const series = [];
    for(let i=5;i>=0;i--){
      const wEnd = new Date(now); wEnd.setDate(now.getDate()-i*7);
      const wStart = new Date(wEnd); wStart.setDate(wEnd.getDate()-6);
      const count = baseRows.filter(r => { const d=parseDate(r[dateCol]); return d && d>=wStart && d<=wEnd; }).length;
      series.push(count);
    }
    seriesByStage[s] = {series, trend: classifyTrend(series), projection: projectForward(series,1), missing:false};
  });

  // Driver analysis on disbursal change (most decision-relevant), by sub-dimension
  let driverDim;
  if(entity){
    if(entity.dim.col === COL.dealerName) driverDim = {col: COL.fos, label:'FOS'};
    else driverDim = {col: COL.dealerName, label:'Dealer'};
  } else {
    driverDim = (explicitGroup && explicitGroup.col) ? explicitGroup : {col: COL.city, label:'City'};
  }
  const drivers = driverDim.col ? driverAnalysis(data.disbursal.cur, data.disbursal.prior, r => (r[driverDim.col]||'Unspecified').trim()||'Unspecified').drivers.slice(0,5) : [];

  const amtCol = COL.grossDisAmt || COL.loanSanction;
  const curAmt = data.disbursal.cur.reduce((s,r)=>s+toNum(r[amtCol]),0);
  const priorAmt = data.disbursal.prior.reduce((s,r)=>s+toNum(r[amtCol]),0);
  const amtGrowthPct = priorAmt ? ((curAmt-priorAmt)/priorAmt*100) : (curAmt>0?Infinity:0);

  const concentrationTopPct = drivers.length ? Math.max(...drivers.map(d=>d.cur)) / (data.disbursal.cur.length||1) * 100 : null;
  const risks = detectRisks({
    growthPct: data.disbursal.growth===Infinity?null:data.disbursal.growth, conversionPct, pendingRatioPct,
    concentrationTopPct, trend: seriesByStage.disbursal.trend.trend
  });
  const opportunities = detectOpportunities({
    growthPct: data.disbursal.growth===Infinity?null:data.disbursal.growth, conversionPct, trend: seriesByStage.disbursal.trend.trend,
    topPerformerGapPct: rankInfo ? Math.abs(rankInfo.vsTopPct) : null
  });

  const glossaryHits = detectGlossaryTerms(qLower).filter(h => h.metric !== undefined && !['mtd','lmtd','qtd','lqtd','ytd','lytd','wow','mom','qoq','yoy'].includes(h.key));
  const glossaryResults = glossaryHits.map(h => ({...h, result: h.metric ? computeGlossaryMetric(h.metric, data.disbursal.cur, {lead:data.lead.cur, login:data.login.cur, approval:data.approval.cur, disbursal:data.disbursal.cur}) : null}));

  let html = `<div class="report">`;
  if(correctionNote) html += correctionNote;

  html += `<h2>📋 Executive Summary</h2>`;
  html += `<p><b>${escapeHtml(scopeLabel)}</b> — full funnel for ${escapeHtml(periodLabel)}: `;
  html += stages.map(s => `${stageEmoji[s]} ${s[0].toUpperCase()+s.slice(1)} <b>${data[s].missing ? 'N/A' : data[s].cur.length}</b>`).join(' · ');
  html += `.</p>`;
  if(missingStages.length){
    html += `<p class="proj-note">⚠️ No ${missingStages.join('/')} date column found in this sheet — those stage(s) show N/A, not zero.</p>`;
  }
  if(rankInfo){
    html += `<p>On Disbursal, ranked <b>#${rankInfo.rank}</b> of ${rankInfo.totalEntities} in ${escapeHtml(rankDim.label)}, ${growthSpan(rankInfo.vsAvgPct)} vs average, ${growthSpan(rankInfo.vsTopPct)} vs top performer (${escapeHtml(rankInfo.topKey||'—')}).</p>`;
  }

  html += `<h2>🎯 Direct Answer</h2>`;
  html += `<table class="result"><tr><th>Stage</th><th>${escapeHtml(periodLabel)}</th><th>${escapeHtml(priorLabel)}</th><th>Change</th></tr>`;
  stages.forEach(s => {
    if(data[s].missing){
      html += `<tr><td>${stageEmoji[s]} ${s[0].toUpperCase()+s.slice(1)}</td><td colspan="3">N/A — no date column for this stage found in the sheet</td></tr>`;
    } else {
      html += `<tr><td>${stageEmoji[s]} ${s[0].toUpperCase()+s.slice(1)}</td><td>${data[s].cur.length.toLocaleString()}</td><td>${data[s].prior.length.toLocaleString()}</td><td>${growthSpan(data[s].growth)}</td></tr>`;
    }
  });
  html += `</table>`;
  const verdict = data.disbursal.growth===Infinity ? {tier:'great',emoji:'🚀',text:'New disbursal activity this period — no prior baseline to compare.'} : verdictForGrowth(data.disbursal.growth);
  html += verdictBadge(verdict);

  html += `<h2>📊 Key Metrics</h2>`;
  html += `<table class="result"><tr><th>Metric</th><th>Value</th></tr>`;
  html += `<tr><td>Lead→Disbursal conversion</td><td>${conversionPct.toFixed(1)}%</td></tr>`;
  html += `<tr><td>Login→Approval rate</td><td>${approvalRatePct.toFixed(1)}%</td></tr>`;
  html += `<tr><td>Approval→Disbursal rate</td><td>${disbursalRatePct.toFixed(1)}%</td></tr>`;
  html += `<tr><td>Disbursal amount (${escapeHtml(periodLabel)})</td><td>${fmtINR(curAmt)} (${growthSpan(amtGrowthPct)} vs ${escapeHtml(priorLabel)})</td></tr>`;
  if(pendingRatioPct !== null) html += `<tr><td>Pending (Approved, not disbursed)</td><td>${pendingRatioPct.toFixed(1)}% (${pendingAll.length} of ${approvedAll.length})</td></tr>`;
  html += `</table>`;

  if(glossaryResults.length){
    html += `<h2>📐 Business Metrics</h2>`;
    html += `<table class="result"><tr><th>Term</th><th>Value</th><th>Basis</th></tr>`;
    glossaryResults.forEach(g => {
      if(g.result) html += `<tr><td>${escapeHtml(g.label)}</td><td>${escapeHtml(g.result.display)}</td><td>${escapeHtml(g.result.note)}</td></tr>`;
      else html += `<tr><td>${escapeHtml(g.label)}</td><td>—</td><td>Not available — this sheet has no column backing this metric.</td></tr>`;
    });
    html += `</table>`;
  }

  html += `<h2>📅 MTD vs LMTD Analysis</h2>`;
  html += `<table class="result"><tr><th>Period</th><th>Date Range</th><th>Lead</th><th>Login</th><th>Approval</th><th>Disbursal</th></tr>`;
  html += `<tr><td>${escapeHtml(periodLabel)}</td><td>${curFrom.toLocaleDateString('en-IN')} – ${curTo.toLocaleDateString('en-IN')}</td>`;
  stages.forEach(s => { html += `<td>${data[s].missing ? 'N/A' : data[s].cur.length.toLocaleString()}</td>`; });
  html += `</tr><tr><td>${escapeHtml(priorLabel)}</td><td>${priorFrom.toLocaleDateString('en-IN')} – ${priorTo.toLocaleDateString('en-IN')}</td>`;
  stages.forEach(s => { html += `<td>${data[s].missing ? 'N/A' : data[s].prior.length.toLocaleString()}</td>`; });
  html += `</tr><tr><td colspan="2"><b>Change</b></td>`;
  stages.forEach(s => { html += `<td>${data[s].missing ? '—' : growthSpan(data[s].growth)}</td>`; });
  html += `</tr></table>`;

  html += `<h2>📈 Trend Analysis</h2>`;
  stages.forEach(s => {
    const t = seriesByStage[s];
    if(t.missing){
      html += `<p><b>${stageEmoji[s]} ${s[0].toUpperCase()+s.slice(1)}</b> — no date column for this stage in the sheet, trend can't be computed.</p>`;
    } else {
      html += `<p><b>${stageEmoji[s]} ${s[0].toUpperCase()+s.slice(1)}</b> — ${t.trend.trend.toUpperCase()} (${t.trend.normalizedSlopePct>=0?'+':''}${t.trend.normalizedSlopePct.toFixed(1)}% slope). Next-period projection ≈ ${t.projection.projected ?? '—'} (confidence: ${t.projection.confidence}).</p>`;
    }
  });

  if(rankInfo){
    html += `<h2>🏁 Benchmark Analysis</h2>`;
    html += `<p>On Disbursal vs ${escapeHtml(rankDim.label)} average (${rankInfo.avgValue.toFixed(1)}): ${growthSpan(rankInfo.vsAvgPct)} &nbsp;·&nbsp; vs top performer ${escapeHtml(rankInfo.topKey||'—')} (${rankInfo.topValue}): ${growthSpan(rankInfo.vsTopPct)}.</p>`;
  }

  html += `<h2>🔍 Root Cause / Top Drivers (Disbursal)</h2>`;
  if(drivers.length){
    html += `<p>Breaking the disbursal change down by <b>${escapeHtml(driverDim.label)}</b>, ranked by contribution:</p>`;
    html += `<table class="result"><tr><th>${escapeHtml(driverDim.label)}</th><th>${escapeHtml(priorLabel)}</th><th>${escapeHtml(periodLabel)}</th><th>Δ</th><th>Contribution</th></tr>`;
    drivers.forEach(d => {
      html += `<tr><td>${escapeHtml(d.key)}</td><td>${d.prior}</td><td>${d.cur}</td><td>${growthSpan(d.delta)}</td><td>${d.contributionPct.toFixed(1)}%</td></tr>`;
    });
    html += `</table>`;
  } else {
    html += `<p>Not enough data in both periods to break down drivers.</p>`;
  }

  html += `<h2>⚠️ Risks</h2>`;
  risks.forEach(r => { html += `<div class="risk-item ${r.severity}"><span class="badge-sev ${r.severity}">${r.severity}</span><span>${escapeHtml(r.text)}</span></div>`; });

  html += `<h2>💡 Opportunities</h2>`;
  opportunities.forEach(o => { html += `<div class="opp-item">🎯 ${escapeHtml(o.text)}</div>`; });

  html += `<h2>✅ Recommended Actions</h2><ul>`;
  if(risks.some(r=>r.severity==='High')) html += `<li>Prioritize the High-severity risk(s) above within this week — assign an owner.</li>`;
  if(pendingRatioPct !== null && pendingRatioPct > 25) html += `<li>Clear the approval→disbursal backlog; review the top contributing ${escapeHtml(driverDim.label).toLowerCase()} for process delays.</li>`;
  if(conversionPct < 20) html += `<li>Audit the lead→disbursal funnel for the biggest drop-off stage — compare login→approval (${approvalRatePct.toFixed(1)}%) vs approval→disbursal (${disbursalRatePct.toFixed(1)}%) to find where leads are lost.</li>`;
  html += `<li>Ask about a specific stage (e.g. "leads this month" or "approvals this month") for a deeper single-stage breakdown.</li>`;
  html += `</ul>`;

  html += `<h2>❓ Leadership Questions</h2><ul>`;
  if(drivers.length){
    const topDriver = drivers[0];
    html += `<li>What changed operationally in <b>${escapeHtml(topDriver.key)}</b> that drove a ${topDriver.delta>=0?'gain':'loss'} of ${Math.abs(topDriver.delta)} disbursal case${Math.abs(topDriver.delta)===1?'':'s'}?</li>`;
  }
  const availableStages = stages.filter(s => !seriesByStage[s].missing);
  if(availableStages.length){
    const weakestStage = availableStages.reduce((min, s) => seriesByStage[s].trend.normalizedSlopePct < seriesByStage[min].trend.normalizedSlopePct ? s : min, availableStages[0]);
    html += `<li>The ${weakestStage} stage shows the weakest trend (${seriesByStage[weakestStage].trend.trend}) — is this a demand, capacity, or process issue?</li>`;
  }
  html += `</ul>`;

  html += `</div>`;
  return html;
}

function buildExecutiveReport(qOriginal){
  const qLower = qOriginal.toLowerCase().trim();
  if(!RAW.length){
    return `<div class="report"><p>No data loaded yet 🕐 — hit "Refresh data" or wait for the initial sync.</p></div>`;
  }

  // Own Book / PMax are business-defined groupings, not literal entity names -- detect these
  // FIRST so a query like "PMax disbursals" doesn't ALSO get picked up by the generic
  // Channel entity-matcher (which would otherwise double-match the literal "PMAX" channel
  // value and produce a confusing double-scoped label).
  const businessFilter = detectBusinessFilter(qLower);
  const entityRaw = businessFilter ? null : detectNamedEntity(qOriginal);
  if(entityRaw && entityRaw.ambiguous){
    const optList = entityRaw.options.map(o => `<li><b>${escapeHtml(o.value)}</b> (${escapeHtml(o.dim.label)})</li>`).join('');
    const introLine = entityRaw.didYouMean
      ? `🤔 I couldn't find an exact match — did you mean one of these?`
      : `🤔 That name matches more than one record — which did you mean?`;
    return `<div class="report"><p>${introLine}</p><ul>${optList}</ul><p class="proj-note">Try asking again with the full name, e.g. "${escapeHtml(entityRaw.options[0].value)} disbursals this month".</p></div>`;
  }
  const entity = entityRaw;
  let correctionNote = '';
  if(entity && entity.corrected){
    correctionNote = `<p class="proj-note">📝 Showing results for <b>${escapeHtml(entity.value)}</b> (closest match to what you typed).</p>`;
  }
  const explicitGroup = detectGroupCol(qLower);
  const stageRaw = detectStage(qLower);
  const dateSpec = extractDateRange(qLower);
  if(dateSpec.dateParseError){
    return `<div class="report"><p>⚠️ ${escapeHtml(dateSpec.dateParseError)} Try a format like <b>12/05/2026</b> (DD/MM/YYYY).</p></div>`;
  }

  // Determine current vs prior period. Default to MTD vs LMTD if no explicit range given.
  const now = new Date();
  let curFrom, curTo, priorFrom, priorTo, periodLabel, priorLabel;
  if(dateSpec.from){
    curFrom = dateSpec.from; curTo = dateSpec.to; periodLabel = dateSpec.label;
    priorFrom = dateSpec.priorFrom; priorTo = dateSpec.priorTo; priorLabel = dateSpec.priorLabel;
  } else {
    [curFrom, curTo] = mtdRange(now); periodLabel = 'MTD';
    [priorFrom, priorTo] = lmtdRange(now); priorLabel = 'LMTD';
  }

  let baseRows = RAW;
  let scopeLabel = 'Company-wide';
  if(entity){
    baseRows = filterByEntity(RAW, entity);
    scopeLabel = `${entity.dim.label}: ${entity.value}`;
  }
  if(businessFilter){
    baseRows = baseRows.filter(businessFilter.test);
    scopeLabel = entity ? `${scopeLabel} — ${businessFilter.label}` : businessFilter.label;
  }

  // No stage explicitly named ("Manu performance", "Bharat Car Bazaar this month") -->
  // show the FULL funnel (Lead, Login, Approval, Disbursal) instead of silently picking one.
  if(!stageRaw){
    return buildFullFunnelReport({baseRows, scopeLabel, entity, explicitGroup, curFrom, curTo, priorFrom, priorTo, periodLabel, priorLabel, qLower, now, correctionNote});
  }
  const stage = stageRaw;

  const curRows = rowsInRange(baseRows, stage, curFrom, curTo);
  const priorRows = rowsInRange(baseRows, stage, priorFrom, priorTo);
  const growthPct = priorRows.length ? ((curRows.length - priorRows.length)/priorRows.length*100) : (curRows.length>0?Infinity:0);

  // Conversion: lead -> disbursal, scoped to baseRows + current window
  const leadColCur = rowsInRange(baseRows, 'lead', curFrom, curTo);
  const loginColCur = rowsInRange(baseRows, 'login', curFrom, curTo);
  const approvalColCur = rowsInRange(baseRows, 'approval', curFrom, curTo);
  const disbColCur = rowsInRange(baseRows, 'disbursal', curFrom, curTo);
  const conversionPct = leadColCur.length ? (disbColCur.length/leadColCur.length*100) : 0;

  // Pending ratio: approved but not disbursed, within baseRows all-time (pipeline snapshot, not date-bound)
  const approvedAll = baseRows.filter(r => parseDate(r[COL.approvalDate]));
  const pendingAll = approvedAll.filter(r => !parseDate(r[COL.disbursalDate]));
  const pendingRatioPct = approvedAll.length ? (pendingAll.length/approvedAll.length*100) : null;

  // Ranking: only meaningful if we have an entity OR an explicit group dimension to rank within
  let rankInfo = null;
  const rankDim = entity ? entity.dim : explicitGroup;
  if(rankDim && rankDim.col){
    const allRows = rowsInRange(RAW, stage, curFrom, curTo);
    const buckets = {};
    allRows.forEach(r => { const k=(r[rankDim.col]||'Unspecified').trim()||'Unspecified'; buckets[k]=(buckets[k]||0)+1; });
    const keyToRank = entity ? entity.value : null;
    if(keyToRank) rankInfo = rankEntity(buckets, keyToRank);
  }

  // Trend: last 6 periods (weekly buckets over ~6 weeks) within baseRows, for the relevant stage
  const dateCol = stageDateCol(stage);
  const series = [];
  for(let i=5;i>=0;i--){
    const wEnd = new Date(now); wEnd.setDate(now.getDate()-i*7);
    const wStart = new Date(wEnd); wStart.setDate(wEnd.getDate()-6);
    const count = baseRows.filter(r => { const d=parseDate(r[dateCol]); return d && d>=wStart && d<=wEnd; }).length;
    series.push(count);
  }
  const trendInfo = classifyTrend(series);
  const projection = projectForward(series, 1);

  // Driver analysis: break down the change by a sub-dimension.
  // If scoped to a named entity, drive by something INSIDE that entity (Dealer, then FOS) —
  // comparing the entity to its peers belongs in Benchmark, not here.
  // If company-wide, drive by the requested group or City as the most natural default.
  let driverDim;
  if(entity){
    if(entity.dim.col === COL.dealerName) driverDim = {col: COL.fos, label:'FOS'};
    else driverDim = {col: COL.dealerName, label:'Dealer'};
  } else {
    driverDim = (explicitGroup && explicitGroup.col) ? explicitGroup : {col: COL.city, label:'City'};
  }
  const drivers = driverDim.col ? driverAnalysis(curRows, priorRows, r => (r[driverDim.col]||'Unspecified').trim()||'Unspecified').drivers.slice(0,5) : [];

  // Amount metrics
  const amtCol = COL.grossDisAmt || COL.loanSanction;
  const curAmt = curRows.reduce((s,r)=>s+toNum(r[amtCol]),0);
  const priorAmt = priorRows.reduce((s,r)=>s+toNum(r[amtCol]),0);
  const amtGrowthPct = priorAmt ? ((curAmt-priorAmt)/priorAmt*100) : (curAmt>0?Infinity:0);

  const concentrationTopPct = drivers.length ? Math.max(...drivers.map(d=>d.cur)) / (curRows.length||1) * 100 : null;
  const risks = detectRisks({growthPct: growthPct===Infinity?null:growthPct, conversionPct, pendingRatioPct, concentrationTopPct, trend: trendInfo.trend});
  const opportunities = detectOpportunities({
    growthPct: growthPct===Infinity?null:growthPct, conversionPct, trend: trendInfo.trend,
    topPerformerGapPct: rankInfo ? Math.abs(rankInfo.vsTopPct) : null
  });

  // Business terminology: detect any standard finance/lending terms in the query and
  // compute them against curRows. Terms with no backing column return null and are
  // reported as unavailable rather than guessed.
  const glossaryHits = detectGlossaryTerms(qLower).filter(h => h.metric !== undefined && !['mtd','lmtd','qtd','lqtd','ytd','lytd','wow','mom','qoq','yoy'].includes(h.key));
  const glossaryResults = glossaryHits.map(h => ({...h, result: h.metric ? computeGlossaryMetric(h.metric, curRows, {lead:leadColCur, login:loginColCur, approval:approvalColCur, disbursal:disbColCur}) : null}));

  const stageLabel = stage.charAt(0).toUpperCase()+stage.slice(1);
  const verdict = growthPct===Infinity ? {tier:'great',emoji:'🚀',text:'New activity this period — no prior baseline to compare.'} : verdictForGrowth(growthPct);

  // ---------- Render ----------
  let html = `<div class="report">`;
  if(correctionNote) html += correctionNote;

  html += `<h2>📋 Executive Summary</h2>`;
  html += `<p><b>${escapeHtml(scopeLabel)}</b> — ${stageLabel} volume is <b>${curRows.length.toLocaleString()}</b> for ${escapeHtml(periodLabel)}`;
  html += growthPct===Infinity ? ` (no comparable prior-period data).</p>` : `, ${growthSpan(growthPct)} vs ${escapeHtml(priorLabel)}.</p>`;
  if(rankInfo){
    html += `<p>Ranked <b>#${rankInfo.rank}</b> of ${rankInfo.totalEntities} in ${escapeHtml(rankDim.label)}, ${growthSpan(rankInfo.vsAvgPct)} vs average, ${growthSpan(rankInfo.vsTopPct)} vs top performer (${escapeHtml(rankInfo.topKey||'—')}).</p>`;
  }

  html += `<h2>🎯 Direct Answer</h2>`;
  html += `<p>${stageLabel} count for <b>${escapeHtml(scopeLabel)}</b> in <b>${escapeHtml(periodLabel)}</b>: <b>${curRows.length.toLocaleString()}</b>${curRows.length && amtCol ? ` · Total amount: <b>${fmtINR(curAmt)}</b>` : ''}.</p>`;
  html += verdictBadge(verdict);

  html += `<h2>📊 Key Metrics</h2>`;
  html += `<table class="result"><tr><th>Metric</th><th>${escapeHtml(periodLabel)}</th><th>${escapeHtml(priorLabel)}</th><th>Change</th></tr>`;
  html += `<tr><td>${stageLabel} count</td><td>${curRows.length.toLocaleString()}</td><td>${priorRows.length.toLocaleString()}</td><td>${growthSpan(growthPct)}</td></tr>`;
  html += `<tr><td>Disbursal amount</td><td>${fmtINR(curAmt)}</td><td>${fmtINR(priorAmt)}</td><td>${growthSpan(amtGrowthPct)}</td></tr>`;
  html += `<tr><td>Lead→Disbursal conv.</td><td colspan="3">${conversionPct.toFixed(1)}%</td></tr>`;
  if(pendingRatioPct !== null) html += `<tr><td>Pending (Approved, not disbursed)</td><td colspan="3">${pendingRatioPct.toFixed(1)}% (${pendingAll.length} of ${approvedAll.length})</td></tr>`;
  html += `</table>`;

  if(glossaryResults.length){
    html += `<h2>📐 Business Metrics</h2>`;
    html += `<table class="result"><tr><th>Term</th><th>Value</th><th>Basis</th></tr>`;
    glossaryResults.forEach(g => {
      if(g.result){
        const displayVal = typeof g.result.value === 'object' ? g.result.display : g.result.display;
        html += `<tr><td>${escapeHtml(g.label)}</td><td>${escapeHtml(displayVal)}</td><td>${escapeHtml(g.result.note)}</td></tr>`;
      } else {
        html += `<tr><td>${escapeHtml(g.label)}</td><td>—</td><td>Not available — this sheet has no column backing this metric.</td></tr>`;
      }
    });
    html += `</table>`;
  }

  html += `<h2>📅 MTD vs LMTD Analysis</h2>`;
  html += `<table class="result"><tr><th>Period</th><th>Date Range</th><th>${escapeHtml(stageLabel)} Count</th><th>Amount</th></tr>`;
  html += `<tr><td>${escapeHtml(periodLabel)}</td><td>${curFrom.toLocaleDateString('en-IN')} – ${curTo.toLocaleDateString('en-IN')}</td><td>${curRows.length.toLocaleString()}</td><td>${fmtINR(curAmt)}</td></tr>`;
  html += `<tr><td>${escapeHtml(priorLabel)}</td><td>${priorFrom.toLocaleDateString('en-IN')} – ${priorTo.toLocaleDateString('en-IN')}</td><td>${priorRows.length.toLocaleString()}</td><td>${fmtINR(priorAmt)}</td></tr>`;
  html += `<tr><td colspan="2"><b>Change</b></td><td>${growthSpan(growthPct)}</td><td>${growthSpan(amtGrowthPct)}</td></tr>`;
  html += `</table>`;

  html += `<h2>📈 Trend Analysis</h2>`;
  html += `<p>Over the last 6 weekly buckets, the trend is classified as <b>${trendInfo.trend.toUpperCase()}</b> (${trendInfo.normalizedSlopePct>=0?'+':''}${trendInfo.normalizedSlopePct.toFixed(1)}% slope relative to mean level).</p>`;
  const maxS = Math.max(...series, 1);
  series.forEach((v,i) => {
    html += `<div class="bar-row"><span class="bar-label">Week ${i-5===0?'(current)':(i-5)}</span><div class="bar-track"><div class="bar-fill ${rankClass(series.length-1-i, series.length)}" style="width:${v/maxS*100}%"></div></div><span class="bar-val">${v}</span></div>`;
  });
  if(projection.projected !== null){
    html += `<p class="proj-note">📐 Basic projection (linear trend, not a predictive model): next period ≈ <b>${projection.projected}</b> · confidence: <b>${projection.confidence}</b> · basis: ${escapeHtml(projection.basis)}.</p>`;
  }

  if(rankInfo){
    html += `<h2>🏁 Benchmark Analysis</h2>`;
    html += `<p>vs ${escapeHtml(rankDim.label)} average (${rankInfo.avgValue.toFixed(1)}): ${growthSpan(rankInfo.vsAvgPct)} &nbsp;·&nbsp; vs top performer ${escapeHtml(rankInfo.topKey||'—')} (${rankInfo.topValue}): ${growthSpan(rankInfo.vsTopPct)}.</p>`;
  }

  html += `<h2>🔍 Root Cause / Top Drivers</h2>`;
  if(drivers.length){
    html += `<p>Breaking the ${growthPct>=0?'change':'decline'} down by <b>${escapeHtml(driverDim.label)}</b>, ranked by contribution:</p>`;
    html += `<table class="result"><tr><th>${escapeHtml(driverDim.label)}</th><th>${escapeHtml(priorLabel)}</th><th>${escapeHtml(periodLabel)}</th><th>Δ</th><th>Contribution</th></tr>`;
    drivers.forEach(d => {
      html += `<tr><td>${escapeHtml(d.key)}</td><td>${d.prior}</td><td>${d.cur}</td><td>${growthSpan(d.delta)}</td><td>${d.contributionPct.toFixed(1)}%</td></tr>`;
    });
    html += `</table>`;
  } else {
    html += `<p>Not enough data in both periods to break down drivers.</p>`;
  }

  html += `<h2>⚠️ Risks</h2>`;
  risks.forEach(r => { html += `<div class="risk-item ${r.severity}"><span class="badge-sev ${r.severity}">${r.severity}</span><span>${escapeHtml(r.text)}</span></div>`; });

  html += `<h2>💡 Opportunities</h2>`;
  opportunities.forEach(o => { html += `<div class="opp-item">🎯 ${escapeHtml(o.text)}</div>`; });

  html += `<h2>✅ Recommended Actions</h2><ul>`;
  if(risks.some(r=>r.severity==='High')) html += `<li>Prioritize the High-severity risk(s) above within this week — assign an owner.</li>`;
  if(pendingRatioPct !== null && pendingRatioPct > 25) html += `<li>Clear the approval→disbursal backlog; review the top contributing ${escapeHtml(driverDim.label).toLowerCase()} for process delays.</li>`;
  if(conversionPct < 20) html += `<li>Audit the lead→disbursal funnel for the biggest drop-off stage (login vs approval vs disbursal).</li>`;
  if(opportunities.some(o=>o.text.includes('growth'))) html += `<li>Study what's driving the strongest-growing segment and test replicating it elsewhere.</li>`;
  html += `<li>Re-run this analysis next cycle to confirm whether the trend persists.</li>`;
  html += `</ul>`;

  html += `<h2>❓ Leadership Questions</h2><ul>`;
  if(drivers.length){
    const topDriver = drivers[0];
    html += `<li>What changed operationally in <b>${escapeHtml(topDriver.key)}</b> that drove a ${topDriver.delta>=0?'gain':'loss'} of ${Math.abs(topDriver.delta)} ${stage} case${Math.abs(topDriver.delta)===1?'':'s'}?</li>`;
  }
  if(rankInfo && rankInfo.rank > 1) html += `<li>What is ${escapeHtml(rankInfo.topKey||'the top performer')} doing differently that ${escapeHtml(scopeLabel)} could adopt?</li>`;
  html += `<li>Is the ${trendInfo.trend} trend driven by demand, capacity, or process — and which lever should leadership pull?</li>`;
  html += `</ul>`;

  html += `</div>`;
  return html;
}

// ================= CHAT UI =================
function addUser(text){
  const div = document.createElement('div'); div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  chatEl.appendChild(div); chatEl.scrollTop = chatEl.scrollHeight;
}
function addBot(html){
  const div = document.createElement('div'); div.className = 'msg bot';
  div.innerHTML = `<div class="bot-icon">🤖</div><div class="bubble">${html}</div>`;
  chatEl.appendChild(div); chatEl.scrollTop = chatEl.scrollHeight;
}
function welcomeMessage(){
  addBot(`Hey Kushagra! 👋✨ Connected to <b>New_Raw_Data</b> in Executive Intelligence mode — every question gets a full business breakdown (metrics, MTD vs LMTD, trend, drivers, risks, opportunities, actions). I also understand standard lending/business terms — AOV, LTV, ROI, CIBIL, NPA-style risk, pendency, market share, and more. Try:
  <div class="hint-chips">
    <span class="chip" data-q="Bharat Car Bazaar disbursals">🏢 Bharat Car Bazaar disbursals</span>
    <span class="chip" data-q="disbursals this month by FOS">🚀 disbursals this month by FOS</span>
    <span class="chip" data-q="AOV and LTV this month">📐 AOV and LTV this month</span>
    <span class="chip" data-q="why did Kanpur drop this month">🔍 why did Kanpur drop this month</span>
    <span class="chip" data-q="CEO summary">📋 CEO summary</span>
  </div>`);
  attachChipHandlers();
}
function attachChipHandlers(){
  document.querySelectorAll('.chip').forEach(c => { c.onclick = () => { qInput.value = c.dataset.q; handleSend(); }; });
}
function handleSend(){
  const text = qInput.value.trim();
  if(!text) return;
  addUser(text);
  qInput.value = ''; qInput.style.height = 'auto';
  try{
    const html = buildExecutiveReport(text);
    addBot(html);
  }catch(e){
    addBot(`<span class="err">😵‍💫 Hit an error building that analysis: ${escapeHtml(e.message)}</span>`);
  }
}
sendBtn.onclick = handleSend;
qInput.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); handleSend(); } });
qInput.addEventListener('input', () => { qInput.style.height='auto'; qInput.style.height = Math.min(qInput.scrollHeight,90)+'px'; });
refreshBtn.onclick = () => loadData(true);

(async function init(){
  welcomeMessage();
  await loadData(false);
})();
</script>
